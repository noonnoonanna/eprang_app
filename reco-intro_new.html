<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<title>이피랑</title>
</head>
<style>
body[data-page="reco-intro"] main{padding:16px 14px 100px;width:100%;max-width:480px;margin:0 auto;}
body[data-page="reco-intro"] main>.card{flex:0 0 auto!important;flex-shrink:0!important;}
body[data-page="reco-intro"] .card{border-radius:18px;background:#fff;border:1px solid #e5e7eb;box-shadow:0 4px 12px rgba(15,23,42,0.04);width:100%;padding:18px;}
body[data-page="reco-intro"] #summaryCard{margin-bottom:16px;}
body[data-page="reco-intro"] #summaryGrid,
body[data-page="reco-intro"] .grid-3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media (max-width: 340px){
  body[data-page="reco-intro"] #summaryGrid,
  body[data-page="reco-intro"] .grid-3{grid-template-columns:1fr;}
  body[data-page="reco-intro"] .badge {
    margin-left: 0; 
  }
}
body[data-page="reco-intro"] .mini-card{padding:10px 12px;border-radius:12px;background:#f9fafb;border:1px solid #e5e7eb;display:flex;flex-direction:column;gap:4px;}
body[data-page="reco-intro"] .mini-label{font-size:13px;font-weight:600;color:#6b7280;}
body[data-page="reco-intro"] .mini-label:not(:first-child){margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e5e7eb;}
body[data-page="reco-intro"] .mini-value{font-size:14px;font-weight:800;color:#111827;line-height:1.4;margin:2px 0 5px 0;}
body[data-page="reco-intro"] .mini-value i{margin-right:4px;font-size:14px;color:#6b7280;}
body[data-page="reco-intro"] .card-list{display:grid;gap:12px;}
body[data-page="reco-intro"] .reco-card{display:flex;gap:12px;padding:14px;border-radius:16px;border:1px solid var(--line);background:#ffffff;box-shadow:0 4px 16px rgba(15,23,42,0.06);transition:0.15s;}
body[data-page="reco-intro"] .reco-icon{flex:0 0 38px;width:38px;height:38px;border-radius:12px;background:rgba(22,163,74,0.08);display:flex;align-items:center;justify-content:center;color:var(--acc);font-size:18px;margin-top:2px;}
body[data-page="reco-intro"] .reco-card.selected .reco-icon {background:rgba(22,163,74,0.18);}
body[data-page="reco-intro"] .reco-card:hover{border-color:rgba(22,163,74,0.35);box-shadow:0 6px 18px rgba(22,163,74,0.12);}
body[data-page="reco-intro"] .reco-card.selected{border-color:rgba(22,163,74,0.6);background:linear-gradient(135deg,#f0fdf4 0%,#ecfdf3 100%);box-shadow:0 10px 26px rgba(22,163,74,0.18);}
body[data-page="reco-intro"] .reco-info h4{margin:0 0 6px;font-size:14px;font-weight:800;}
body[data-page="reco-intro"] .reco-info p{margin:2px 0 4px;font-size:13px;color:#4b5563;line-height:1.7;}
body[data-page="reco-intro"] .reco-meta{list-style:none;padding:0;margin:4px 0 0;display:grid;gap:3px;font-size:12px;color:#6b7280;}
body[data-page="reco-intro"] .reco-meta i{margin-right:4px;font-size:13px;color:#9ca3af;}
body[data-page="reco-intro"] .info-box{display:flex;align-items:flex-start;gap:8px;margin-top:16px;padding:10px 12px;background:#f1f5f9;border:1px solid #cbd5f5;border-radius:12px;font-size:12px;color:#1e293b;line-height:1.5;}
body[data-page="reco-intro"] .info-box i{font-size:14px;margin-top:2px;color:#1d4ed8;}
body[data-page="reco-intro"] .badge-green {background: #e6f9ea;border-color: #bbf7d0;color: #166534;}
body[data-page="reco-intro"] .badge-gray {background: #f3f4f6;border-color: #e5e7eb;color: #4b5563;}
body[data-page="reco-intro"] .badge{flex-shrink:0;white-space:nowrap;height:22px;line-height:22px;padding:0 10px;display:inline-flex;align-items:center;}
body[data-page="reco-intro"] .reco-header {display: flex;flex-direction: row;flex-wrap: wrap;align-items: center;gap: 8px 6px;margin-bottom: 12px;width: 100%;}
body[data-page="reco-intro"] .reco-header h4 {flex: 0 0 100%;margin: 0 !important;font-size: 15px;font-weight: 800;color: #111827;line-height: 1.4;}
body[data-page="reco-intro"] .reco-header p {display: none !important;}
body[data-page="reco-intro"] .ai-badge,
body[data-page="reco-intro"] .badge {display: inline-flex !important;align-items: center;justify-content: center;white-space: nowrap;flex-shrink: 0;height: 22px;box-sizing: border-box;margin: 0 !important;}
body[data-page="reco-intro"] .badge {padding: 0 8px;font-size: 11px;font-weight: 600;border-radius: 6px;border: 1px solid transparent;}
body[data-page="reco-intro"] .reco-meta li {display:flex; align-Items: center; gap:3px; background:#f3f4f6; borderRadius:6px; padding:3px 8px; whiteSpace: nowrap;}
body[data-page="reco-intro"] .reco-card.selected .reco-meta li {background:rgba(22,163,74,0.08); color: #166534;}
body[data-page="reco-intro"] .ai-badge {gap: 4px;padding: 0 8px;font-size: 11px;font-weight: 700;color: #16a34a;background-color: #f0fdf4;border: 1px solid rgba(22, 163, 74, 0.2);border-radius: 6px;}
body[data-page="reco-intro"] .ai-badge i {font-size: 10px;color: #16a34a;animation: shine 2s infinite ease-in-out;}
body[data-page="reco-intro"] .reco-card.selected .ai-badge {color: #15803d;background-color: rgba(22, 163, 74, 0.12);border-color: rgba(22, 163, 74, 0.3);}
body[data-page="reco-intro"] .reco-card.selected .ai-badge i {color: #15803d;}
@keyframes shine {
  0%, 100% { opacity: 0.6; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.1); }
}
.section-title {margin-top:0;}
.section-subtitle {font-size:12px;}
.ai-score-row{display:flex;align-items:center;gap:8px;margin:10px 0 8px;}
.ai-score{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:12px;font-weight:800;}
.ai-reasons{margin:0 0 10px;padding:10px 12px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;}
.ai-reasons strong{display:block;margin-bottom:5px;font-size:12px;color:#334155;}
.ai-reasons ul{margin:0;padding-left:17px;color:#475569;font-size:12px;line-height:1.65;}
/* 추천 카드: 모바일 비교형 레이아웃 */
body[data-page="reco-intro"] .card-list{gap:16px;}
body[data-page="reco-intro"] .reco-loading{display:flex;align-items:center;justify-content:center;gap:8px;min-height:90px;border-radius:14px;background:#f8fafc;color:#64748b;font-size:12px;font-weight:700;}
body[data-page="reco-intro"] .reco-loading i{color:#16a34a;}
body[data-page="reco-intro"] .reco-card{display:block;position:relative;padding:18px;border-radius:18px;cursor:pointer;overflow:hidden;}
body[data-page="reco-intro"] .reco-card.selected::after{content:'선택됨';position:absolute;right:12px;top:12px;padding:4px 8px;border-radius:999px;background:#16a34a;color:#fff;font-size:10px;font-weight:800;}
body[data-page="reco-intro"] .reco-info{width:100%;}
body[data-page="reco-intro"] .reco-top{display:grid;grid-template-columns:1fr 64px;gap:12px;align-items:start;}
body[data-page="reco-intro"] .reco-rank{display:inline-flex;align-items:center;gap:5px;margin-bottom:7px;color:#15803d;font-size:11px;font-weight:800;}
body[data-page="reco-intro"] .reco-title{margin:0 0 8px;font-size:17px;font-weight:850;line-height:1.35;color:#111827;padding-right:4px;}
body[data-page="reco-intro"] .reco-badges{display:flex;flex-wrap:wrap;gap:5px;}
body[data-page="reco-intro"] .score-ring{--score:0;width:62px;height:62px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(#16a34a calc(var(--score)*1%),#e5e7eb 0);position:relative;}
body[data-page="reco-intro"] .score-ring::before{content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;}
body[data-page="reco-intro"] .reco-card.selected .score-ring::before{background:#f0fdf4;}
body[data-page="reco-intro"] .score-value{position:relative;text-align:center;font-size:17px;font-weight:900;color:#15803d;line-height:1;}
body[data-page="reco-intro"] .score-value small{display:block;margin-top:3px;font-size:8px;font-weight:700;color:#64748b;}
body[data-page="reco-intro"] .reco-description{margin:13px 0 12px!important;padding-top:12px;border-top:1px solid #edf2f7;font-size:12px!important;line-height:1.55!important;color:#64748b!important;}
body[data-page="reco-intro"] .reason-block{margin-bottom:13px;}
body[data-page="reco-intro"] .reason-label{margin-bottom:7px;font-size:12px;font-weight:800;color:#334155;}
body[data-page="reco-intro"] .reason-chips{display:flex;flex-wrap:wrap;gap:6px;}
body[data-page="reco-intro"] .reason-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 8px;border-radius:8px;background:#ecfdf5;color:#166534;font-size:12px;font-weight:650;line-height:1.25;}
body[data-page="reco-intro"] .reason-chip i{font-size:10px;color:#16a34a;}
body[data-page="reco-intro"] .reco-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
body[data-page="reco-intro"] .meta-box{min-width:0;padding:9px 10px;border-radius:10px;background:#f8fafc;border:1px solid #eef2f7;}
body[data-page="reco-intro"] .reco-card.selected .meta-box{background:rgba(255,255,255,.7);}
body[data-page="reco-intro"] .meta-label{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10px;color:#94a3b8;}
body[data-page="reco-intro"] .meta-value{overflow:hidden;text-overflow:ellipsis;font-size:12px;font-weight:750;color:#334155;line-height:1.35;}
/* 결과 요약: 핵심 조건을 먼저 보여주는 히어로형 레이아웃 */
body[data-page="reco-intro"] #summaryCard{display:block!important;padding:0!important;overflow:hidden;border-color:#dbeee2;height:auto!important;min-height:1px!important;max-height:none!important;opacity:1!important;visibility:visible!important;}
body[data-page="reco-intro"] #summaryGrid{display:block!important;grid-template-columns:none!important;gap:0!important;width:100%!important;height:auto!important;min-height:1px!important;max-height:none!important;overflow:visible!important;opacity:1!important;visibility:visible!important;}
body[data-page="reco-intro"] #summaryGrid>.summary-hero{display:block!important;position:relative!important;height:auto!important;min-height:0!important;max-height:none!important;opacity:1!important;visibility:visible!important;transform:none!important;}
body[data-page="reco-intro"] #summaryGrid>.summary-details{display:grid!important;position:relative!important;height:auto!important;min-height:0!important;max-height:none!important;opacity:1!important;visibility:visible!important;transform:none!important;}
body[data-page="reco-intro"] .summary-hero{padding:20px 18px 17px;background:linear-gradient(135deg,#f0fdf4 0%,#f8fffa 58%,#ecfdf5 100%);border-bottom:1px solid #dcfce7;position:relative;}
body[data-page="reco-intro"] .summary-hero::after{content:'';position:absolute;width:110px;height:110px;right:-38px;top:-46px;border-radius:50%;background:rgba(34,197,94,.09);}
body[data-page="reco-intro"] .summary-kicker{display:flex;align-items:center;gap:6px;margin-bottom:8px;color:#15803d;font-size:16px;font-weight:850;}
body[data-page="reco-intro"] .summary-main-title{margin:0 0 5px;font-size:20px;font-weight:900;letter-spacing:-.025em;color:#17211b;line-height:1.3;}
body[data-page="reco-intro"] .summary-main-sub{margin:0;color:#64748b;font-size:12px;line-height:1.55;}
body[data-page="reco-intro"] .summary-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px;}
body[data-page="reco-intro"] .summary-chip{display:inline-flex;align-items:center;gap:5px;padding:7px 9px;border-radius:9px;background:rgba(255,255,255,.9);border:1px solid #dbe7df;color:#334155;font-size:13px;font-weight:750;box-shadow:0 2px 6px rgba(15,23,42,.03);}
body[data-page="reco-intro"] .summary-chip i{color:#16a34a;font-size:10px;}
body[data-page="reco-intro"] .summary-details{display:grid;grid-template-columns:1fr 1fr;padding:5px 18px 13px;background:#fff;}
body[data-page="reco-intro"] .summary-detail{min-width:0;padding:13px 8px;border-bottom:1px solid #f1f5f9;}
body[data-page="reco-intro"] .summary-detail:nth-last-child(-n+2){border-bottom:0;}
body[data-page="reco-intro"] .summary-detail:nth-child(odd){padding-left:0;padding-right:12px;border-right:1px solid #f1f5f9;}
body[data-page="reco-intro"] .summary-detail:nth-child(even){padding-left:12px;padding-right:0;}
body[data-page="reco-intro"] .summary-detail-label{display:flex;align-items:center;gap:5px;margin-bottom:4px;color:#94a3b8;font-size:12px;font-weight:650;}
body[data-page="reco-intro"] .summary-detail-label i{color:#86a893;}
body[data-page="reco-intro"] .summary-detail-value{font-size:13px;font-weight:800;color:#334155;line-height:1.4;word-break:keep-all;}
</style>
<body data-page="reco-intro">
<script src="app.js"></script>
<script src="layout-package-helper.js"></script>
<div class="app">
	<header>
		<div class="bar">
			<div class="logo">
        <a href="intro.html" style="all:unset;cursor:pointer">
          <img src="img/logo.png" alt="이피랑 로고">
        </a>
      </div>
		</div>
	</header>

  <main class="container" id="recoMain" style="padding-bottom: 80px;">
    <!-- 요약 -->
    <section class="card" id="summaryCard" style="margin-bottom: 16px;">
      <div id="summaryGrid">
        <!-- JS로 채움 -->
      </div>
    </section>

    <!-- 추천 설계안 -->
    <section class="card">
      <h3 class="section-title"><i class="fa-solid fa-lightbulb"></i> 추천 설계안</h3>
      <p class="section-subtitle">
        입력하신 조건을 바탕으로 실내 스마트팜 설계안 3개를 제안드려요.<br>
        마음에 드는 설계안을 선택하고, 나중에 다시 이어서 보정할 수 있습니다.
      </p>
      <div id="recoList" class="card-list">
        <div class="reco-loading"><i class="fa-solid fa-spinner fa-spin"></i> 입력 조건을 분석하고 있어요.</div>
      </div>

      <div class="info-box" style="margin-top:16px;">
        <i class="fa-solid fa-circle-info"></i>
        <span>
          추천 설계안들은 모두 <strong>실내 공간 전용</strong> 기준입니다. 실제 자재·공사비·운영비는 상세 설계 및 견적 산출 과정에서 최종 확정됩니다.
        </span>
      </div>
    </section>
  </main>

  <!-- 하단 버튼 바 -->
  <div class="bottom-bar">
    <button type="button" class="btn ghost" id="btnBackSurvey">설문 다시 하기</button>
    <button type="button" class="btn acc" id="btnSaveProject">
      저장하기
    </button>
  </div>
</div>

<script>
  (function() {
    const raw = localStorage.getItem('eprang-survey-latest');
    if (!raw) {
      alert('설문 데이터가 없습니다. 처음부터 다시 진행해 주세요.');
      window.location.assign('survey_new.html');
      return;
    }

    const survey = JSON.parse(raw);

    // ===== 1. 요약 박스 =====
    function renderSummary() {
      const box = document.getElementById('summaryGrid');
      if (!box) return;

      const s1 = survey.step1 || {};
      const s2 = survey.step2 || {};
      const s3 = survey.step3 || {};
	  
	  const usableArea = s2.usable_area || s2.floor_area;
	  const areaText = usableArea ? `${usableArea}㎡` : '면적 미입력';

      const userTypeLabel = {
        young: '청년농',
        successor: '후계농',
        return: '귀농 예정',
        other: '일반 창업자'
      }[s1.user_type] || '미선택';

      const facilityLabel = {
        biz_center: '지식산업센터',
        retail_space: '상가/근린생활시설',
        panel_factory: '판넬형 창고·공장',
        etc: '기타 실내 공간'
      }[s2.facility] || '미선택';

      const workHoursLabel = {
        '': '미선택',
        lt10: '주 10시간 미만',
        '10_20': '주 10~20시간',
        '20_40': '주 20~40시간',
        gt40: '주 40시간 이상'
      }[s2.work_hours || ''] || '미선택';

      const workTypeLabel = {
        fulltime: '상근(풀타임)',
        parttime: '부업/겸업'
      }[s2.work_type] || '미선택';

      const profitLabel = {
        '': '미설정',
        '100': '월 100만 원 미만',
        '300': '월 100~300만 원',
        '500': '월 300~500만 원',
        high: '월 500만 원 이상'
      }[s3.profit_goal || ''] || '미설정';

      const familyStaffText = s2.family_staff
        ? `${s2.family_staff}명`
        : '없음/미입력';

      const distMap = {
        wholesale: '도매',
        horeca_retail: '식당/카페/리테일',
        experience_edu_landscape: '체험·교육·조경',
        mixed_use: '복합(생산+체험/조경)'
      };
      const distArr = Array.isArray(s3.distribution) ? s3.distribution : [];
      const distLabels = distArr.map(v => distMap[v]).filter(Boolean);
      if (s3.distribution_etc && s3.distribution_etc.trim()) {
        distLabels.push(s3.distribution_etc.trim());
      }
      const distributionText = distLabels.length ? distLabels.join(', ') : '미선택';

      const ceilingText = s2.ceil_height ? `층고 ${s2.ceil_height}m` : '층고 미입력';
      const electricLabel = {
        single: '단상 전력',
        three: '3상 전력',
        unknown: '전력 확인 필요'
      }[s2.electric_phase] || '전력 미입력';
      const regionText = s1.region_si || '지역 미입력';

      box.innerHTML = `
        <div class="summary-hero">
          <div class="summary-kicker"><i class="fa-solid fa-wand-magic-sparkles"></i> 내 조건 요약</div>
          <h2 class="summary-main-title">${regionText} · ${facilityLabel}</h2>
          <p class="summary-main-sub">입력하신 조건을 분석해 적합도가 높은 설계안 3개를 찾았어요.</p>
          <div class="summary-chips">
            <span class="summary-chip"><i class="fa-solid fa-border-all"></i>${areaText}</span>
            <span class="summary-chip"><i class="fa-solid fa-arrows-up-down"></i>${ceilingText}</span>
            <span class="summary-chip"><i class="fa-solid fa-briefcase"></i>${workTypeLabel}</span>
            <span class="summary-chip"><i class="fa-solid fa-bolt"></i>${electricLabel}</span>
          </div>
        </div>
        <div class="summary-details">
          <div class="summary-detail"><div class="summary-detail-label"><i class="fa-solid fa-user"></i> 창업 유형</div><div class="summary-detail-value">${userTypeLabel}</div></div>
          <div class="summary-detail"><div class="summary-detail-label"><i class="fa-solid fa-clock"></i> 운영 시간</div><div class="summary-detail-value">${workHoursLabel}</div></div>
          <div class="summary-detail"><div class="summary-detail-label"><i class="fa-solid fa-users"></i> 가족 인력</div><div class="summary-detail-value">${familyStaffText}</div></div>
          <div class="summary-detail"><div class="summary-detail-label"><i class="fa-solid fa-chart-line"></i> 목표 수익</div><div class="summary-detail-value">${profitLabel}</div></div>
          <div class="summary-detail" style="grid-column:1/-1;border-right:0;border-bottom:0;padding-left:0;padding-right:0;"><div class="summary-detail-label"><i class="fa-solid fa-truck"></i> 선호 유통 방식</div><div class="summary-detail-value">${distributionText}</div></div>
        </div>
      `;
    }

    // ===== 2. 추천 설계안 생성 (항상 3개) =====
async function buildRecoList() {

  const s2 = survey.step2 || {};
  const s3 = survey.step3 || {};

  const { data, error } = await supabaseClient
    .from('reco_templates')
    .select('*');

  if (error || !data) {
    console.error(error);
    return [];
  }

  function calcScore(item) {

    const baseScore = Number(item.ai_score_base || 50);
    let score = baseScore;
    const reasons = [];
    const tags = item.tags || [];

    // 근무시간
    if (s2.work_hours === 'lt10' && tags.includes('parttime')) {
      score += 25;

      reasons.push(`${s2.ceil_height}m 층고 활용 다단 재배`);
    }

    // 전기
    if (s2.electric_phase === 'three' && tags.includes('high_power')) {
      score += 20;
      reasons.push('3상 전력 기반 고출력 설비 구성');
    }

    // 리테일
    if (
      s3.distribution?.includes('experience_edu_landscape')

	// 면적
const area = Number(s2.usable_area || s2.floor_area || 0);

if (area <= 30 && tags.includes('compact')) {

  reasons.push(`${area || 30}평 이하 컴팩트 공간 활용`);
}

if (area >= 100 && tags.includes('large_scale')) {
  score += 30;
  reasons.push(`${area}평 대형 공간 운영에 적합`);
}

// 가족 운영
if (
  Number(s2.family_staff || 0) >= 2 &&
  tags.includes('family')
) {
  score += 20;
  reasons.push(`가족 인력 ${s2.family_staff}명 활용에 적합`);
}

// 시설 유형
if (
  s2.facility === 'biz_center' &&
  tags.includes('biz_center')
) {
  score += 25;
  reasons.push('지식산업센터 실내 환경에 적합');
}

// 목표 수익
if (
  s3.profit_goal === 'high' &&
  tags.includes('high_profit')
) {
  score += 30;
  reasons.push('높은 목표 수익을 위한 생산성 중심 설계');
}

    if (!reasons.length) {
      reasons.push('입력한 시설·운영 조건과 유사한 구성');
    }

    let possibleBonus = 0;
    if (s2.work_hours === 'lt10') possibleBonus += 25;
    if (s2.work_type === 'fulltime') possibleBonus += 20;
    if (Number(s2.ceil_height) >= 4) possibleBonus += 30;
    if (s2.electric_phase === 'three') possibleBonus += 20;
    if (s3.distribution?.includes('experience_edu_landscape')) possibleBonus += 35;
    if (area <= 30 || area >= 100) possibleBonus += 30;
    if (Number(s2.family_staff || 0) >= 2) possibleBonus += 20;
    if (s2.facility === 'biz_center') possibleBonus += 25;
    if (s3.profit_goal === 'high') possibleBonus += 30;

    const matchedBonus = score - baseScore;
    const conditionFit = possibleBonus > 0
      ? Math.min(100, Math.round((matchedBonus / possibleBonus) * 100))
      : baseScore;
    const displayScore = Math.min(99, Math.max(0, Math.round(baseScore * 0.65 + conditionFit * 0.35)));

    return { score, displayScore, reasons };
  }

  const ranked = data
    .map(item => {
      const match = calcScore(item);
      return {
        ...item,
        ai_match: match.score,
        ai_display_score: match.displayScore,
        ai_reasons: match.reasons
      };
    })
    .sort((a,b) => b.ai_match - a.ai_match)
    .slice(0,3);

  return ranked;
}
