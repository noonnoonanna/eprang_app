<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>프로젝트 기록 · 이피랑</title>
  <style>
    :root{--r-green:#16a34a;--r-deep:#166534;--r-ink:#17221b;--r-sub:#68786e;--r-line:#e1e9e3;--r-soft:#f4f8f5}
    body[data-page="records"]{background:#f6f8f7;color:var(--r-ink)}
    body[data-page="records"] main{display:block;width:100%;max-width:480px;margin:0 auto;padding:18px 14px 110px}
    .rec-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:0 2px 16px}.rec-head h1{margin:0 0 4px;font-size:22px;line-height:1.3;letter-spacing:-.04em}.rec-head p{margin:0;color:var(--r-sub);font-size:12px;line-height:1.5}.rec-add{flex:none;width:35px;height:35px;border:0;border-radius:10px;background:var(--r-green);color:#fff;display:grid;place-items:center;box-shadow:0 3px 0 #0f7433;cursor:pointer}.rec-add:active{transform:translateY(2px);box-shadow:0 1px 0 #0f7433}.rec-add .lucide{width:17px;height:17px}
    .rec-overview{position:relative;overflow:hidden;margin-bottom:14px;padding:17px;border:1px solid #d8e9dd;border-radius:20px;background:linear-gradient(145deg,#effbf2,#fbfffc);box-shadow:0 7px 20px rgba(27,67,43,.06)}.rec-overview:after{content:"";position:absolute;right:-55px;top:-65px;width:140px;height:140px;border-radius:50%;background:#bbf7d044}.rec-overview-top{position:relative;z-index:1;display:flex;align-items:center;gap:6px;margin-bottom:13px;color:var(--r-deep);font-size:11px;font-weight:750}.rec-overview-top .lucide{width:14px;height:14px}.rec-stats{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.rec-stat{padding:11px 9px;border:1px solid #dfebe2;border-radius:12px;background:#ffffffd9}.rec-stat span{display:block;margin-bottom:4px;color:#839189;font-size:9px;font-weight:650}.rec-stat strong{font-size:16px;color:#26382d}.rec-stat:first-child strong{color:#15803d}
    .rec-block{margin-bottom:14px;padding:16px;border:1px solid var(--r-line);border-radius:20px;background:#fff;box-shadow:0 6px 18px rgba(15,23,42,.045)}.rec-block-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}.rec-block-title{display:flex;align-items:center;gap:7px;margin:0;font-size:14px}.rec-block-title .lucide{width:16px;height:16px;color:var(--r-green)}.rec-count{font-size:9px;color:#94a3b8}
    .rec-activity{display:grid;gap:2px}.rec-activity-item{display:grid;grid-template-columns:30px 1fr;gap:9px;padding:9px 0;border-bottom:1px solid #f0f3f1}.rec-activity-item:last-child{border-bottom:0;padding-bottom:0}.activity-icon{width:30px;height:30px;border-radius:9px;background:#eef8f1;color:#16a34a;display:grid;place-items:center}.activity-icon .lucide{width:14px;height:14px}.activity-copy strong{display:block;margin-bottom:2px;color:#34443a;font-size:10px;line-height:1.4}.activity-copy span{display:block;color:#91a098;font-size:9px;line-height:1.4}
    .rec-filter{display:flex;gap:7px;overflow-x:auto;margin:0 -2px 12px;padding:2px 2px 5px;scrollbar-width:none}.rec-filter::-webkit-scrollbar{display:none}.rec-chip{flex:none;height:31px;padding:0 11px;border:1px solid #dfe7e2;border-radius:9px;background:#fff;color:#64748b;font-size:10px;font-weight:650;cursor:pointer;display:inline-flex;align-items:center;gap:5px}.rec-chip .lucide{width:12px;height:12px}.rec-chip.active{border-color:#92d7a7;background:#edf9f1;color:#15803d}
    .rec-list{display:grid;gap:10px}.rec-card{position:relative;overflow:hidden;padding:15px;border:1px solid #dfe7e2;border-radius:17px;background:#fff;cursor:pointer;transition:.18s;box-shadow:0 4px 13px rgba(15,23,42,.035)}.rec-card:hover{transform:translateY(-1px);border-color:#b9dbc4;box-shadow:0 8px 20px rgba(15,23,42,.07)}.rec-card:active{transform:scale(.995)}.rec-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:9px;margin-bottom:10px}.rec-title-wrap{min-width:0}.rec-title{margin:0 0 4px;color:#24342a;font-size:14px;line-height:1.45;font-weight:750;letter-spacing:-.025em;word-break:keep-all}.rec-date{display:flex;align-items:center;gap:4px;color:#94a3b8;font-size:8px}.rec-date .lucide{width:10px;height:10px}.rec-status{flex:none;padding:5px 7px;border-radius:7px;background:#eef8f1;color:#15803d;font-size:8px;font-weight:750}.rec-status.done{background:#f1f5f9;color:#64748b}
    .rec-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}.rec-meta span{display:inline-flex;align-items:center;gap:4px;padding:5px 7px;border-radius:7px;background:#f5f8f6;color:#607167;font-size:9px}.rec-meta .lucide{width:11px;height:11px;color:#16a34a}.rec-progress{margin-bottom:11px}.rec-progress-head{display:flex;justify-content:space-between;margin-bottom:5px;color:#84928a;font-size:8px}.rec-progress-head strong{color:#506158;font-size:8px}.rec-progress-track{height:5px;border-radius:999px;background:#e9eeeb;overflow:hidden}.rec-progress-track span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#16a34a,#4ade80)}.rec-next{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;border-radius:11px;background:#f1f8f3}.rec-next-copy{min-width:0}.rec-next-copy small{display:block;margin-bottom:2px;color:#84a08c;font-size:8px}.rec-next-copy strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#326043;font-size:10px}.rec-open{flex:none;width:27px;height:27px;border:1px solid #d6e7db;border-radius:8px;background:#fff;color:#16a34a;display:grid;place-items:center}.rec-open .lucide{width:13px;height:13px}
    .rec-empty{padding:34px 20px;border:1px dashed #cbd8cf;border-radius:19px;background:#fbfdfb;text-align:center}.rec-empty>.lucide{width:29px;height:29px;margin-bottom:10px;color:#91a098}.rec-empty strong{display:block;margin-bottom:5px;font-size:14px}.rec-empty p{margin:0;color:#74827a;font-size:10px;line-height:1.55}.rec-empty button{height:38px;margin-top:14px;padding:0 14px;border:0;border-radius:9px;background:#16a34a;color:#fff;font-size:10px;font-weight:700;box-shadow:0 3px 0 #0f7433}.rec-loading{padding:28px;text-align:center;color:#7b8a81;font-size:11px}.tabs .lucide{width:20px;height:20px;stroke-width:1.8}
  </style>
</head>
<body data-page="records"><div class="app">
  <header>
			<div class="bar">
				<div class="logo"><a href="home.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
			</div>
		</header>
  <main>
    <div class="rec-head"><div><h1>프로젝트 기록</h1><p>프로젝트를 선택해 조건·설계·진행 기록을 확인하세요.</p></div><button type="button" class="rec-add" id="recAdd" aria-label="새 프로젝트 만들기"><i data-lucide="plus"></i></button></div>
    <section class="rec-overview"><div class="rec-overview-top"><i data-lucide="folder-kanban"></i>내 프로젝트 현황</div><div class="rec-stats"><div class="rec-stat"><span>전체</span><strong id="statAll">0</strong></div><div class="rec-stat"><span>진행 중</span><strong id="statActive">0</strong></div><div class="rec-stat"><span>완료</span><strong id="statDone">0</strong></div></div></section>
    <section class="rec-block" id="activityBlock" hidden><div class="rec-block-head"><h2 class="rec-block-title"><i data-lucide="clock-3"></i>최근 활동</h2><span class="rec-count" id="activityCount"></span></div><div class="rec-activity" id="activityList"></div></section>
    <div class="rec-filter" id="recFilter" hidden></div>
    <div class="rec-list" id="recList"><div class="rec-loading">프로젝트 기록을 불러오는 중입니다.</div></div>
    <div class="rec-empty" id="recEmpty" hidden><i data-lucide="folder-plus"></i><strong>아직 저장된 프로젝트가 없어요.</strong><p>설문을 완료하고 설계안을 선택하면<br>여기에 프로젝트 기록이 쌓입니다.</p><button type="button" onclick="location.assign('survey_new.html')">첫 프로젝트 만들기</button></div>
  </main>
  <nav class="tabs"><ul><li><button id="tab-home" onclick="location.assign('home.html')"><i data-lucide="house"></i><small>홈</small></button></li><li><button id="tab-records" class="active" onclick="location.assign('records.html')"><i data-lucide="list-checks"></i><small>기록</small></button></li><li><button id="tab-reco" onclick="location.assign('deals.html')"><i data-lucide="file-signature"></i><small>견적</small></button></li><li><button id="tab-my" onclick="location.assign('settings.html')"><i data-lucide="user"></i><small>마이</small></button></li></ul></nav>
</div><div id="overlay" class="overlay" onclick="closeModal&&closeModal(event)"></div><div id="modal" class="modal" style="display:none"></div><div id="toast" class="toast">처리되었습니다</div>
<script src="app.js" defer></script><script>
document.addEventListener('DOMContentLoaded',async function(){
 const list=document.getElementById('recList'),empty=document.getElementById('recEmpty'),filter=document.getElementById('recFilter'),activityBlock=document.getElementById('activityBlock'),activityList=document.getElementById('activityList');let projects=[],selected='all';
 const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const icons=()=>window.lucide&&window.lucide.createIcons();
 const done=s=>['operating','done','complete'].includes(s);const labels={draft:'설계 중',quote_requested:'견적 요청',quote_review:'견적 검토',quote_received:'견적 검토',contracted:'계약 진행',construction:'시공 중',operating:'운영 중',done:'완료',complete:'완료'};const steps={draft:1,quote_requested:2,quote_review:2,quote_received:2,contracted:3,construction:4,operating:5,done:5,complete:5};
 const format=v=>{if(!v)return '-';const d=new Date(v);return isNaN(d)?'-':d.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})};
 const facility=v=>({biz_center:'지식산업센터',panel_factory:'판넬형 창고·공장',retail_space:'상가·근린시설'}[v]||'실내 공간');
 const next=s=>({draft:'설계안을 검토하고 견적을 요청하세요.',quote_requested:'견적 회신을 기다리고 있어요.',quote_review:'견적 조건을 확인하고 협의하세요.',quote_received:'견적 조건을 확인하고 협의하세요.',contracted:'착공 일정을 확인하세요.',construction:'공정별 진행 상태를 확인하세요.',operating:'운영 데이터와 메모를 기록하세요.',done:'완료된 프로젝트 기록을 확인하세요.',complete:'완료된 프로젝트 기록을 확인하세요.'}[s]||'프로젝트 진행 상태를 확인하세요.');
 try{projects=await fetchProjects();if(projects.length){const {data:{session}}=await supabaseClient.auth.getSession();if(session){const sr=await supabaseClient.from('project_surveys').select('*').in('project_id',projects.map(p=>p.id));const surveys=sr.data||[];projects=projects.map(p=>({...p,survey:surveys.find(s=>String(s.project_id)===String(p.id))||{}}))}}}catch(e){console.error('기록 조회 오류',e);projects=[]}
 document.getElementById('statAll').textContent=projects.length;document.getElementById('statActive').textContent=projects.filter(p=>!done(p.status)).length;document.getElementById('statDone').textContent=projects.filter(p=>done(p.status)).length;document.getElementById('recAdd').onclick=()=>location.assign('survey_new.html');
 if(!projects.length){list.hidden=true;empty.hidden=false;icons();return}
 const activities=[...projects].sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at)).slice(0,3);activityList.innerHTML=activities.map(p=>'<div class="rec-activity-item"><span class="activity-icon"><i data-lucide="'+(p.memo?'notebook-pen':'circle-dot-dashed')+'"></i></span><div class="activity-copy"><strong>'+esc(p.memo?'운영 메모가 업데이트되었어요.':next(p.status))+'</strong><span>'+esc(p.name||'이름 없는 프로젝트')+' · '+format(p.updated_at||p.created_at)+'</span></div></div>').join('');document.getElementById('activityCount').textContent=activities.length+'건';activityBlock.hidden=false;
 function renderFilter(){const chips=[{id:'all',label:'전체',icon:'layers-3'},{id:'active',label:'진행 중',icon:'loader-circle'},{id:'done',label:'완료',icon:'circle-check'}];filter.innerHTML=chips.map(x=>'<button type="button" class="rec-chip '+(selected===x.id?'active':'')+'" data-filter="'+x.id+'"><i data-lucide="'+x.icon+'"></i>'+x.label+'</button>').join('');filter.hidden=false;filter.querySelectorAll('button').forEach(b=>b.onclick=()=>{selected=b.dataset.filter;renderFilter();renderCards()});icons()}
 function renderCards(){let rows=projects;if(selected==='active')rows=rows.filter(p=>!done(p.status));if(selected==='done')rows=rows.filter(p=>done(p.status));list.innerHTML=rows.map(p=>{const s=p.survey||{},stage=steps[p.status]||1,percent=Math.round(stage/5*100),area=s.usable_area||s.floor_area;return '<article class="rec-card" data-id="'+esc(p.id)+'" tabindex="0" role="button"><div class="rec-card-head"><div class="rec-title-wrap"><h2 class="rec-title">'+esc(p.name||'이름 없는 프로젝트')+'</h2><span class="rec-date"><i data-lucide="calendar-days"></i>'+format(p.created_at)+'</span></div><span class="rec-status '+(done(p.status)?'done':'')+'">'+esc(labels[p.status]||'진행 중')+'</span></div><div class="rec-meta"><span><i data-lucide="map-pin"></i>'+esc(s.region_si||'지역 미입력')+'</span><span><i data-lucide="building-2"></i>'+esc(facility(s.facility))+'</span>'+(area?'<span><i data-lucide="ruler"></i>'+esc(area)+'㎡</span>':'')+'</div><div class="rec-progress"><div class="rec-progress-head"><span>프로젝트 진행률</span><strong>'+percent+'%</strong></div><div class="rec-progress-track"><span style="width:'+percent+'%"></span></div></div><div class="rec-next"><div class="rec-next-copy"><small>다음 확인</small><strong>'+esc(next(p.status))+'</strong></div><span class="rec-open"><i data-lucide="chevron-right"></i></span></div></article>'}).join('')||'<div class="rec-empty"><i data-lucide="inbox"></i><strong>해당하는 프로젝트가 없어요.</strong><p>다른 상태 필터를 선택해 보세요.</p></div>';list.querySelectorAll('.rec-card').forEach(card=>{const open=()=>{localStorage.setItem('ep-current-project-id',card.dataset.id);location.assign('project-detail.html')};card.onclick=open;card.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open()}}});icons()}
 renderFilter();renderCards();icons();
});
</script></body></html>
