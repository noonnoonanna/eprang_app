<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <title>이피랑 - 리마인더</title>
  <style>
    :root{--rm-green:#16a34a;--rm-text:#1f2937;--rm-sub:#64748b;--rm-line:#e2e8f0}
    body[data-page="reminder"]{background:#f7f9f8;color:var(--rm-text)}
    body[data-page="reminder"] main{display:block;width:100%;max-width:480px;margin:0 auto;padding:18px 14px 110px}
    .rm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:0 2px 17px}
    .rm-head h1{margin:0 0 4px;font-size:21px;font-weight:740;letter-spacing:-.035em}
    .rm-head p{margin:0;color:var(--rm-sub);font-size:12px}
    .rm-add{height:35px;padding:0 11px;border:0;border-radius:8px;background:#16a34a;color:#fff;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;box-shadow:0 3px 0 #0f7433,0 5px 8px rgba(22,163,74,.15)}
    .rm-add .lucide{width:14px;height:14px}
    .rm-filters{display:flex;gap:7px;overflow:auto;margin:0 -14px 14px;padding:0 14px 5px;scrollbar-width:none}
    .rm-filters::-webkit-scrollbar{display:none}
    .rm-filter{flex:0 0 auto;height:31px;padding:0 12px;border:1px solid #dce5df;border-radius:999px;background:#fff;color:#64748b;font-size:12px;font-weight:650}
    .rm-filter.active{border-color:#16a34a;background:#16a34a;color:#fff;box-shadow:0 2px 5px rgba(22,163,74,.16)}
    .rm-card{margin-bottom:14px;padding:16px;border:1px solid #dfe7e2;border-radius:20px;background:#fff;box-shadow:0 7px 20px rgba(15,23,42,.05)}
    .rm-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
    .rm-month{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700}.rm-month .lucide{width:17px;height:17px;color:#16a34a}
    .rm-nav{display:flex;gap:5px}.rm-nav button{width:31px;height:31px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc;color:#64748b;display:grid;place-items:center}.rm-nav .lucide{width:15px;height:15px}
    .rm-week,.rm-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}.rm-week{margin-bottom:4px;color:#94a3b8;font-size:14px}.rm-week span{text-align:center;padding:4px 0}
    .rm-day{height:39px;border:0;background:transparent;padding:0;display:grid;place-items:center;color:#334155;font-size:14px}
    .rm-day.empty{pointer-events:none}.rm-day span{position:relative;width:31px;height:31px;border-radius:11px;display:grid;place-items:center}
    .rm-day.today span{border:1px solid #86efac;color:#15803d}.rm-day.selected span{background:#16a34a;color:#fff}.rm-day.has span::after{content:"";position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:#f59e0b}.rm-day.selected span::after{background:#fff}
    .rm-list-head{display:flex;align-items:end;justify-content:space-between;margin:22px 2px 10px}.rm-list-head h2{margin:0;font-size:16px;font-weight:720}.rm-count{color:#94a3b8;font-size:14px}
    .rm-list{display:grid;gap:9px}.rm-empty{padding:25px 16px;border:1px dashed #cbd8cf;border-radius:16px;background:#fbfdfb;text-align:center;color:#7b8b81;font-size:12px;line-height:1.55}
    .rm-event{width:100%;padding:13px;border:1px solid #e1e8e4;border-radius:16px;background:#fff;text-align:left;box-shadow:0 3px 11px rgba(15,23,42,.035);display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
    .rm-datebox{width:42px;height:46px;border-radius:12px;background:#f0fdf4;color:#15803d;display:flex;flex-direction:column;align-items:center;justify-content:center}.rm-datebox strong{font-size:16px;line-height:1}.rm-datebox small{margin-top:3px;font-size:13px;font-weight:650}
    .rm-event.policy .rm-datebox{background:#fff7e6;color:#b45309}.rm-event.education .rm-datebox{background:#eff6ff;color:#1d4ed8}
    .rm-event-body{min-width:0}.rm-event-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}.rm-type{padding:4px 6px;border-radius:6px;background:#dcfce7;color:#15803d;font-size:12px;font-weight:700}.policy .rm-type{background:#fef3c7;color:#a16207}.education .rm-type{background:#dbeafe;color:#1d4ed8}
    .rm-dday{color:#ef4444;font-size:11px;font-weight:700}.rm-event-title{margin:0 0 4px;color:#26332b;font-size:15px;font-weight:650;line-height:1.4;word-break:keep-all}.rm-event-meta{color:#94a3b8;font-size:13px}.rm-chevron{width:15px;height:15px;color:#a3aea8}
    .rm-source-note{display:flex;gap:8px;margin-top:12px;padding:11px 12px;border-radius:13px;background:#f1f5f9;color:#64748b;font-size:10px;line-height:1.5}.rm-source-note .lucide{width:15px;height:15px;flex:0 0 15px;color:#16a34a}
    .rm-overlay{position:fixed;inset:0;z-index:180;background:rgba(15,23,42,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s}.rm-overlay.show{opacity:1;pointer-events:auto}
    .rm-sheet{position:fixed;z-index:190;left:50%;bottom:0;width:100%;max-width:430px;max-height:82vh;overflow:auto;padding:10px 18px 25px;border-radius:24px 24px 0 0;background:#fff;transform:translate(-50%,105%);transition:.25s ease}.rm-sheet.show{transform:translate(-50%,0)}
    .rm-handle{width:38px;height:4px;border-radius:2px;background:#d1d5db;margin:0 auto 18px}.rm-sheet-head{display:flex;justify-content:space-between;gap:12px}.rm-sheet h2{margin:8px 0 8px;font-size:19px;line-height:1.45;font-weight:740;letter-spacing:-.025em}.rm-close{width:34px;height:34px;flex:0 0 34px;border:0;border-radius:11px;background:#f1f5f9;color:#64748b;display:grid;place-items:center}.rm-close .lucide{width:17px;height:17px}
    .rm-sheet-summary{margin:0 0 17px;color:#64748b;font-size:12px;line-height:1.65}.rm-detail-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #e2e8f0;border-radius:15px;overflow:hidden;margin-bottom:15px}.rm-detail{padding:12px;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}.rm-detail:nth-child(even){border-right:0}.rm-detail:nth-last-child(-n+2){border-bottom:0}.rm-detail small{display:block;margin-bottom:4px;color:#94a3b8;font-size:9px;font-weight:650}.rm-detail strong{color:#334155;font-size:11px;line-height:1.45;font-weight:650}
    .rm-sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rm-sheet-actions a,.rm-sheet-actions button{height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:700;text-decoration:none}.rm-source{border:1px solid #cbd5e1;background:#fff;color:#475569}.rm-save{border:0;background:#16a34a;color:#fff;box-shadow:0 3px 0 #0f7433}.rm-sheet-actions .lucide{width:14px;height:14px}
    .tabs .lucide{width:20px;height:20px;stroke-width:1.8}
  </style>
</head>
<body data-page="reminder">
  <div class="app">
    <header>
      <div class="bar">
        <div class="logo"><a href="home.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
      </div>
    </header>

    <main>
      <div class="rm-head"><div><h1>리마인더</h1><p>프로젝트와 지원 일정을 한곳에서 확인하세요.</p></div><button class="rm-add" id="rmAdd"><i data-lucide="plus"></i>일정 추가</button></div>
      <div class="rm-filters" id="rmFilters">
        <button class="rm-filter active" data-filter="all">전체</button><button class="rm-filter" data-filter="project">내 프로젝트</button><button class="rm-filter" data-filter="policy">정책자금</button><button class="rm-filter" data-filter="education">교육·세미나</button>
      </div>
      <section class="rm-card">
        <div class="rm-cal-head"><div class="rm-month"><i data-lucide="calendar-days"></i><span id="rmMonth"></span></div><div class="rm-nav"><button id="rmPrev" aria-label="이전 달"><i data-lucide="chevron-left"></i></button><button id="rmNext" aria-label="다음 달"><i data-lucide="chevron-right"></i></button></div></div>
        <div class="rm-week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="rm-grid" id="rmGrid"></div>
      </section>
      <div class="rm-list-head"><h2 id="rmListTitle">다가오는 일정</h2><span class="rm-count" id="rmCount">0건</span></div>
      <div class="rm-list" id="rmList"></div>
      <div class="rm-source-note"><i data-lucide="shield-check"></i><span>정책 일정은 공식 공고 확인을 위한 MVP 알림입니다. 실제 신청 전 반드시 원문에서 지역별 접수기간과 자격을 확인하세요.</span></div>
    </main>

    <nav class="tabs"><ul>
      <li><button id="tab-home" onclick="window.location.assign('home.html')"><i data-lucide="house"></i><small>홈</small></button></li>
      <li><button id="tab-records" onclick="window.location.assign('records.html')"><i data-lucide="list-checks"></i><small>기록</small></button></li>
      <li><button id="tab-reco" onclick="window.location.assign('deals.html')"><i data-lucide="file-signature"></i><small>견적</small></button></li>
      <li><button id="tab-my" onclick="window.location.assign('settings.html')"><i data-lucide="user"></i><small>마이</small></button></li>
    </ul></nav>
  </div>

  <div class="rm-overlay" id="rmOverlay"></div><section class="rm-sheet" id="rmSheet" aria-modal="true" role="dialog"><div class="rm-handle"></div><div id="rmSheetContent"></div></section>
  <div id="toast" class="toast">처리되었습니다</div>
  <script src="app.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', async function(){
    const seedPolicyEvents=[
      {id:'policy-smartfarm-ict',type:'policy',date:'2026-08-10',title:'스마트팜 ICT 융복합 확산사업 공고 확인',summary:'시설원예·스마트팜 관련 지역별 지원사업 공고와 신청기간을 확인하는 일정입니다.',region:'전국·지자체별',target:'시설원예·스마트팜 도입 농가',benefit:'ICT 시설·장비 지원(공고별 상이)',source:'농림축산식품부',url:'https://www.mafra.go.kr/bbs/home/798/574277/artclView.do'},
      {id:'education-young-farmer',type:'education',date:'2026-09-01',title:'청년농업인 교육·지원사업 일정 확인',summary:'청년농업인을 위한 교육과 지원사업 모집 정보를 확인하는 일정입니다.',region:'전국',target:'청년농업인·예비농업인',benefit:'교육·사업·사례 정보',source:'농촌진흥청 똑똑청년농부',url:'https://www.data.go.kr/data/15112316/openapi.do'},
      {id:'policy-energy',type:'policy',date:'2026-10-15',title:'농업에너지 이용효율화 사업 확인',summary:'신재생에너지 시설과 에너지 절감 관련 사업지침 및 지역 공고를 확인합니다.',region:'전국·지자체별',target:'시설원예 농업인·농업법인',benefit:'에너지 절감시설 지원(공고별 상이)',source:'농림축산식품부',url:'https://www.mafra.go.kr/bbs/home/798/574274/artclView.do'},
      {id:'education-smartfarm-seminar',type:'education',date:'2026-11-12',title:'스마트팜 교육·세미나 정보 확인',summary:'스마트팜 운영과 데이터 활용 관련 최신 교육 일정을 확인합니다.',region:'전국',target:'스마트팜 예비·운영 농가',benefit:'교육·기술정보',source:'농사로',url:'https://www.nongsaro.go.kr/portal/ps/psn/psnj/openApiLst.ps?menuId=PS65428'}
    ];
    // 나중에 Supabase Edge Function 또는 서버 수집 API 주소만 지정하면
    // 같은 화면이 외부 동기화 데이터로 자동 전환됩니다.
    async function loadPolicyEvents(){
      const endpoint=window.EP_POLICY_API_ENDPOINT||'';
      if(!endpoint)return seedPolicyEvents;
      try{
        const response=await fetch(endpoint,{headers:{Accept:'application/json'}});
        if(!response.ok)throw new Error('정책 일정 API '+response.status);
        const payload=await response.json();
        const rows=Array.isArray(payload)?payload:payload.events;
        return Array.isArray(rows)&&rows.length?rows:seedPolicyEvents;
      }catch(error){console.error('정책 일정 API 연결 오류',error);return seedPolicyEvents}
    }
    const policyEvents=await loadPolicyEvents();
    let projectEvents=[];
    try{
      const {data:{session}}=await supabaseClient.auth.getSession();
      if(session){
        const {data}=await supabaseClient.from('projects').select('id,name,status,created_at').eq('user_id',session.user.id).order('created_at',{ascending:false});
        projectEvents=(data||[]).map(p=>({id:'project-'+p.id,type:'project',projectId:p.id,date:(p.created_at||'').slice(0,10),title:p.name||'스마트팜 프로젝트',summary:'저장한 설계안을 확인하고 다음 견적·계약 단계를 준비하세요.',region:'내 프로젝트',target:'프로젝트 진행',benefit:'설계안·견적 진행 확인',source:'이피랑 프로젝트',url:'project-detail.html'}));
      }
    }catch(e){console.error('리마인더 프로젝트 조회 오류',e)}
    let events=policyEvents.concat(projectEvents);
    let view=new Date(), selected='', filter='all'; view.setDate(1);
    const $=s=>document.querySelector(s), grid=$('#rmGrid'), list=$('#rmList');
    const pad=n=>String(n).padStart(2,'0'), dateKey=(y,m,d)=>y+'-'+pad(m+1)+'-'+pad(d);
    const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function visible(){return events.filter(e=>(filter==='all'||e.type===filter)&&(!selected||e.date===selected));}
    function renderCalendar(){
      const y=view.getFullYear(),m=view.getMonth(),first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),today=new Date();
      $('#rmMonth').textContent=y+'년 '+(m+1)+'월'; let html='';
      for(let i=0;i<first;i++)html+='<button class="rm-day empty"></button>';
      for(let d=1;d<=last;d++){const key=dateKey(y,m,d),has=events.some(e=>e.date===key&&(filter==='all'||e.type===filter)),isToday=today.toDateString()===new Date(y,m,d).toDateString();html+='<button class="rm-day '+(has?'has ':'')+(isToday?'today ':'')+(selected===key?'selected ':'')+'" data-date="'+key+'"><span>'+d+'</span></button>'}
      grid.innerHTML=html;
    }
    function dday(date){const n=Math.ceil((new Date(date+'T23:59:59')-new Date())/86400000);return n>=0?'D-'+n:'종료'}
    function renderList(){const rows=visible().sort((a,b)=>a.date.localeCompare(b.date));$('#rmCount').textContent=rows.length+'건';$('#rmListTitle').textContent=selected?selected.replaceAll('-','.')+' 일정':'다가오는 일정';
      if(!rows.length){list.innerHTML='<div class="rm-empty">선택한 조건에 표시할 일정이 없습니다.</div>';return}
      list.innerHTML=rows.map(e=>{const dt=new Date(e.date+'T00:00:00');return '<button class="rm-event '+e.type+'" data-id="'+esc(e.id)+'"><span class="rm-datebox"><strong>'+dt.getDate()+'</strong><small>'+(dt.getMonth()+1)+'월</small></span><span class="rm-event-body"><span class="rm-event-top"><span class="rm-type">'+(e.type==='project'?'내 프로젝트':e.type==='policy'?'정책자금':'교육·세미나')+'</span><span class="rm-dday">'+dday(e.date)+'</span></span><h3 class="rm-event-title">'+esc(e.title)+'</h3><span class="rm-event-meta">'+esc(e.source)+'</span></span><i data-lucide="chevron-right" class="rm-chevron"></i></button>'}).join('');icons();
    }
    function icons(){if(window.lucide)window.lucide.createIcons({attrs:{'aria-hidden':'true'}})}
    function render(){renderCalendar();renderList();icons()}
    function openEvent(id){const e=events.find(x=>x.id===id);if(!e)return;const project=e.type==='project';$('#rmSheetContent').innerHTML='<div class="rm-sheet-head"><div><span class="rm-type">'+(project?'내 프로젝트':e.type==='policy'?'정책자금':'교육·세미나')+'</span><h2>'+esc(e.title)+'</h2></div><button class="rm-close" id="rmClose"><i data-lucide="x"></i></button></div><p class="rm-sheet-summary">'+esc(e.summary)+'</p><div class="rm-detail-grid"><div class="rm-detail"><small>일정</small><strong>'+esc(e.date)+'</strong></div><div class="rm-detail"><small>지역</small><strong>'+esc(e.region)+'</strong></div><div class="rm-detail"><small>대상</small><strong>'+esc(e.target)+'</strong></div><div class="rm-detail"><small>내용</small><strong>'+esc(e.benefit)+'</strong></div></div><div class="rm-sheet-actions"><a class="rm-source" href="'+esc(e.url)+'" '+(project?'':'target="_blank" rel="noopener"')+'><i data-lucide="external-link"></i>'+(project?'프로젝트 보기':'공식 원문 보기')+'</a><button class="rm-save" id="rmSave"><i data-lucide="bell-plus"></i>내 일정에 추가</button></div>';
      $('#rmOverlay').classList.add('show');$('#rmSheet').classList.add('show');icons();$('#rmClose').onclick=closeSheet;$('#rmSave').onclick=()=>saveReminder(e);
      history.replaceState(null,'','reminder.html?event='+encodeURIComponent(e.id));
    }
    function closeSheet(){ $('#rmOverlay').classList.remove('show');$('#rmSheet').classList.remove('show');history.replaceState(null,'','reminder.html') }
    function saveReminder(e){const key='ep-user-reminders',saved=JSON.parse(localStorage.getItem(key)||'[]');if(!saved.some(x=>x.id===e.id))saved.push(e);localStorage.setItem(key,JSON.stringify(saved));toast('내 일정에 추가했습니다.');}
    $('#rmPrev').onclick=()=>{view.setMonth(view.getMonth()-1);selected='';render()};$('#rmNext').onclick=()=>{view.setMonth(view.getMonth()+1);selected='';render()};
    grid.onclick=e=>{const b=e.target.closest('[data-date]');if(!b)return;selected=selected===b.dataset.date?'':b.dataset.date;render()};
    $('#rmFilters').onclick=e=>{const b=e.target.closest('[data-filter]');if(!b)return;filter=b.dataset.filter;selected='';document.querySelectorAll('.rm-filter').forEach(x=>x.classList.toggle('active',x===b));render()};
    list.onclick=e=>{const b=e.target.closest('[data-id]');if(b)openEvent(b.dataset.id)};$('#rmOverlay').onclick=closeSheet;$('#rmAdd').onclick=()=>toast('직접 일정 추가 기능은 다음 단계에서 연결됩니다.');
    render();const requested=new URLSearchParams(location.search).get('event');if(requested)openEvent(requested);
  });
  </script>
</body>
</html>
