<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <title>이피랑 - 견적·계약</title>
  <style>
    :root{--dl-green:#16a34a;--dl-dark:#17221b;--dl-sub:#64748b;--dl-line:#e1e8e4}
    body[data-page="deals"]{background:#f6f8f7;color:var(--dl-dark)}
    body[data-page="deals"] main{display:block;width:100%;max-width:480px;margin:0 auto;padding:18px 14px 110px}
    .dl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:0 2px 17px}.dl-head h1{margin:0 0 4px;font-size:21px;font-weight:740;letter-spacing:-.035em}.dl-head p{margin:0;color:var(--dl-sub);font-size:12px;line-height:1.5}
    .dl-help{width:36px;height:36px;flex:0 0 36px;border:1px solid #dfe7e2;border-radius:11px;background:#fff;color:#64748b;display:grid;place-items:center}.dl-help .lucide{width:17px;height:17px}
    .dl-tabs{display:flex;gap:6px;margin:0 -14px 15px;padding:0 14px 5px;overflow:auto;scrollbar-width:none}.dl-tabs::-webkit-scrollbar{display:none}.dl-tab{flex:0 0 auto;height:34px;padding:0 12px;border:1px solid #dce5df;border-radius:999px;background:#fff;color:#64748b;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:650}.dl-tab .lucide{width:13px;height:13px}.dl-tab.active{border-color:#16a34a;background:#16a34a;color:#fff;box-shadow:0 2px 6px rgba(22,163,74,.17)}
    .dl-list-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}.dl-list-head h2{margin:0;font-size:16px;font-weight:720}.dl-count{color:#94a3b8;font-size:11px}
    .dl-list{display:grid;gap:13px}.dl-empty{padding:28px 18px;border:1px dashed #cbd8cf;border-radius:18px;background:#fbfdfb;text-align:center;color:#728078;font-size:12px;line-height:1.6}.dl-empty .lucide{display:block;width:26px;height:26px;margin:0 auto 10px;color:#94a3b8}
    .deal-card{padding:17px;border:1px solid var(--dl-line);border-radius:21px;background:#fff;box-shadow:0 7px 20px rgba(15,23,42,.055)}
    .deal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:13px}.deal-title-wrap{min-width:0}.deal-kicker{display:flex;align-items:center;gap:5px;margin-bottom:5px;color:#16a34a;font-size:9px;font-weight:700}.deal-kicker .lucide{width:12px;height:12px}.deal-title{margin:0;color:#1f2d24;font-size:15px;line-height:1.45;font-weight:720;letter-spacing:-.025em;word-break:keep-all}.stage-badge{flex:0 0 auto;padding:5px 8px;border-radius:7px;background:#16a34a;color:#fff;font-size:9px;font-weight:700;box-shadow:0 2px 0 #0f7433}
    .deal-steps{display:grid;grid-template-columns:repeat(4,1fr);margin:0 0 14px}.deal-step{position:relative;padding-top:15px;text-align:center;color:#a0aaa3;font-size:8px;font-weight:600}.deal-step::before{content:"";position:absolute;z-index:2;top:3px;left:50%;width:8px;height:8px;border-radius:50%;background:#dbe3de;transform:translateX(-50%)}.deal-step::after{content:"";position:absolute;top:6px;left:-50%;width:100%;height:2px;background:#e4eae6}.deal-step:first-child::after{display:none}.deal-step.done,.deal-step.current{color:#15803d}.deal-step.done::before,.deal-step.current::before{background:#16a34a}.deal-step.done::after,.deal-step.current::after{background:#86efac}.deal-step.current::before{box-shadow:0 0 0 4px #dcfce7}
    .next-action{display:flex;gap:10px;align-items:flex-start;margin-bottom:13px;padding:11px 12px;border-radius:13px;background:#f0f7f2;border:1px solid #e0ebe4}.next-icon{width:28px;height:28px;flex:0 0 28px;border-radius:9px;background:#dcfce7;color:#15803d;display:grid;place-items:center}.next-icon .lucide{width:14px;height:14px}.next-action small{display:block;margin-bottom:2px;color:#15803d;font-size:9px;font-weight:700}.next-action p{margin:0;color:#42534a;font-size:11px;line-height:1.5;font-weight:500}
    .quote-box{margin-bottom:13px;padding:14px;border-radius:15px;background:#17221b;color:#fff}.quote-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;color:#b7c7bd;font-size:9px}.quote-label span{display:flex;align-items:center;gap:5px}.quote-label .lucide{width:12px;height:12px}.quote-value{font-size:20px;font-weight:720;letter-spacing:-.025em}.quote-sub{margin-top:5px;color:#9eb0a5;font-size:9px}.quote-box.pending{background:#f4f7f5;color:#475569;border:1px solid #e0e7e2}.quote-box.pending .quote-label,.quote-box.pending .quote-sub{color:#849188}.quote-box.pending .quote-value{font-size:15px;color:#33473a}
    .scope-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}.scope-box{padding:11px;border:1px solid #e5ebe7;border-radius:13px;background:#fbfcfb}.scope-head{display:flex;align-items:center;gap:5px;margin-bottom:7px;color:#334155;font-size:10px;font-weight:700}.scope-head .lucide{width:13px;height:13px;color:#16a34a}.scope-box.caution .scope-head .lucide{color:#f59e0b}.scope-list{list-style:none;margin:0;padding:0;display:grid;gap:5px}.scope-list li{display:flex;align-items:flex-start;gap:5px;color:#64748b;font-size:9px;line-height:1.4}.scope-list .lucide{width:10px;height:10px;flex:0 0 10px;margin-top:1px;color:#86a292}
    .check-card{margin-bottom:13px;padding:12px;border:1px solid #e4eae6;border-radius:14px}.check-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;color:#334155;font-size:10px;font-weight:700}.check-title span{display:flex;align-items:center;gap:5px}.check-title .lucide{width:13px;height:13px;color:#16a34a}.check-progress{font-size:9px;color:#94a3b8}.check-items{display:grid;grid-template-columns:1fr 1fr;gap:6px}.check-item{display:flex;align-items:center;gap:5px;color:#64748b;font-size:9px}.check-item .lucide{width:11px;height:11px;color:#94a3b8}
    .deal-actions{display:grid;grid-template-columns:1fr 1.35fr;gap:8px}.deal-actions button{height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;font-weight:700}.deal-actions .lucide{width:14px;height:14px}.btn-project{border:1px solid #d8e2dc;background:#fff;color:#526158}.btn-primary{border:0;background:#16a34a;color:#fff;box-shadow:0 3px 0 #0f7433,0 5px 8px rgba(22,163,74,.14)}
    .dl-note{display:flex;gap:8px;margin-top:12px;padding:11px 12px;border-radius:13px;background:#f1f5f9;color:#64748b;font-size:10px;line-height:1.5}.dl-note .lucide{width:15px;height:15px;flex:0 0 15px;color:#16a34a}
    .tabs .lucide{width:20px;height:20px;stroke-width:1.8}
    body[data-page="deals"] .tabs button.active{color:#16a34a;background:#f0fdf4}
    body[data-page="deals"] .tabs button.active small{color:#16a34a}
    @media(max-width:350px){.scope-grid,.check-items{grid-template-columns:1fr}}
  </style>
</head>
<body data-page="deals">
  <div class="app">
    <header>
      <div class="bar">
        <div class="logo"><a href="home.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
      </div>
    </header>
    <main>
      <div class="dl-head"><div><h1>견적·계약</h1><p>비용과 조건을 확인하고 다음 결정을 준비하세요.</p></div><button class="dl-help" id="dlHelp" aria-label="견적 도움말"><i data-lucide="circle-help"></i></button></div>
      <div class="dl-tabs" id="dlTabs">
        <button class="dl-tab active" data-stage="request"><i data-lucide="send"></i>견적 요청</button><button class="dl-tab" data-stage="quote"><i data-lucide="file-text"></i>견적 검토</button><button class="dl-tab" data-stage="contract"><i data-lucide="handshake"></i>계약 진행</button><button class="dl-tab" data-stage="done"><i data-lucide="circle-check"></i>완료</button>
      </div>
      <div class="dl-list-head"><h2 id="dlTitle">견적 요청</h2><span class="dl-count" id="dlCount">0건</span></div><div class="dl-list" id="dlList"><div class="dl-empty">프로젝트를 불러오는 중입니다.</div></div>
      <div class="dl-note"><i data-lucide="shield-check"></i><span>표시된 금액과 조건은 공급사가 등록한 견적을 기준으로 합니다. 계약 전 부가세·별도 공사·하자보수 범위를 반드시 확인하세요.</span></div>
    </main>
    <nav class="tabs"><ul>
      <li><button id="tab-home" onclick="window.location.assign('home.html')"><i data-lucide="house"></i><small>홈</small></button></li><li><button id="tab-records" onclick="window.location.assign('records.html')"><i data-lucide="list-checks"></i><small>기록</small></button></li><li><button id="tab-reco" onclick="window.location.assign('deals.html')" class="active"><i data-lucide="file-signature"></i><small>견적</small></button></li><li><button id="tab-my" onclick="window.location.assign('settings.html')"><i data-lucide="user"></i><small>마이</small></button></li>
    </ul></nav>
  </div>
  <div id="overlay" class="overlay" onclick="closeModal && closeModal(event)"></div><div id="modal" class="modal" style="display:none"></div><div id="toast" class="toast">처리되었습니다</div>
  <script src="app.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded',async function(){
    const labels={request:'견적 요청',quote:'견적 검토',contract:'계약 진행',done:'완료'};
    const stageIndex={request:0,quote:1,contract:2,done:3};
    function stageOf(status){if(['quote_review','quote_received'].includes(status))return'quote';if(['contracted','construction'].includes(status))return'contract';if(['operating','done','complete'].includes(status))return'done';return'request'}
    function nextFor(stage){return stage==='request'?'현장 조건을 확인한 뒤 공급사의 견적 회신을 기다려 주세요.':stage==='quote'?'포함 범위와 별도 공사를 비교하고 수정 여부를 결정해 주세요.':stage==='contract'?'최종 금액, 지급 일정과 하자보수 조건을 확인해 주세요.':'최종 문서와 운영 인수인계 내용을 확인해 주세요.'}
    function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function money(project){const raw=project.quote_total??project.quote_amount??null;if(raw===null||raw==='')return null;const n=Number(raw);return Number.isFinite(n)?n.toLocaleString('ko-KR')+'원':String(raw)}
    let projects=[];try{const {data:{session}}=await supabaseClient.auth.getSession();if(session){const {data,error}=await supabaseClient.from('projects').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false});if(error)throw error;projects=data||[]}}catch(error){console.error('견적 프로젝트 조회 오류',error)}
    let current='request';const requested=new URLSearchParams(location.search).get('project');if(requested){const p=projects.find(x=>String(x.id)===requested);if(p)current=stageOf(p.status)}
    function icons(){if(window.lucide)window.lucide.createIcons({attrs:{'aria-hidden':'true'}})}
    function steps(stage){const names=['요청','검토','계약','완료'],now=stageIndex[stage];return '<div class="deal-steps">'+names.map((n,i)=>'<span class="deal-step '+(i<now?'done':i===now?'current':'')+'">'+n+'</span>').join('')+'</div>'}
    function card(p){const stage=stageOf(p.status),amount=money(p),valid=p.quote_valid_until||'-',idx=stageIndex[stage];return '<article class="deal-card" data-id="'+esc(p.id)+'"><div class="deal-top"><div class="deal-title-wrap"><div class="deal-kicker"><i data-lucide="folder-kanban"></i>스마트팜 프로젝트</div><h3 class="deal-title">'+esc(p.name||'이름 없는 프로젝트')+'</h3></div><span class="stage-badge">'+labels[stage]+'</span></div>'+steps(stage)+'<div class="next-action"><span class="next-icon"><i data-lucide="arrow-right"></i></span><div><small>다음 할 일</small><p>'+nextFor(stage)+'</p></div></div>'+(amount?'<div class="quote-box"><div class="quote-label"><span><i data-lucide="receipt-text"></i>현재 견적</span><span>유효기간 '+esc(valid)+'</span></div><div class="quote-value">'+esc(amount)+'</div><div class="quote-sub">부가세 및 별도 공사 포함 여부를 확인해 주세요.</div></div>':'<div class="quote-box pending"><div class="quote-label"><span><i data-lucide="calculator"></i>견적 현황</span></div><div class="quote-value">견적 산출 중</div><div class="quote-sub">공간 조건과 설비 수량을 확인하고 있습니다.</div></div>')+'<div class="scope-grid"><section class="scope-box"><div class="scope-head"><i data-lucide="list-checks"></i>포함 범위 확인</div><ul class="scope-list"><li><i data-lucide="circle"></i>재배랙·LED·양액설비</li><li><i data-lucide="circle"></i>설치·시운전·운영교육</li><li><i data-lucide="circle"></i>무상관리 기간</li></ul></section><section class="scope-box caution"><div class="scope-head"><i data-lucide="triangle-alert"></i>별도 협의 확인</div><ul class="scope-list"><li><i data-lucide="circle"></i>전기 증설·소방 공사</li><li><i data-lucide="circle"></i>방수·배수·냉난방</li><li><i data-lucide="circle"></i>인허가와 부가세</li></ul></section></div><div class="check-card"><div class="check-title"><span><i data-lucide="clipboard-check"></i>계약 전 체크리스트</span><span class="check-progress">'+(idx>=2?'검토 필요':'견적 도착 후 확인')+'</span></div><div class="check-items"><span class="check-item"><i data-lucide="square"></i>최종 금액</span><span class="check-item"><i data-lucide="square"></i>공사 기간</span><span class="check-item"><i data-lucide="square"></i>지급 일정</span><span class="check-item"><i data-lucide="square"></i>하자보수</span></div></div><div class="deal-actions"><button class="btn-project" data-action="project"><i data-lucide="folder-open"></i>프로젝트 정보</button><button class="btn-primary" data-action="consult"><i data-lucide="messages-square"></i>'+(stage==='quote'?'견적 검토하기':'상담 요청')+'</button></div></article>'}
    function render(){document.querySelectorAll('.dl-tab').forEach(b=>b.classList.toggle('active',b.dataset.stage===current));const rows=projects.filter(p=>stageOf(p.status)===current);document.getElementById('dlTitle').textContent=labels[current];document.getElementById('dlCount').textContent=rows.length+'건';document.getElementById('dlList').innerHTML=rows.length?rows.map(card).join(''):'<div class="dl-empty"><i data-lucide="inbox"></i>'+labels[current]+' 단계의 프로젝트가 없습니다.</div>';icons()}
    document.getElementById('dlTabs').onclick=e=>{const b=e.target.closest('[data-stage]');if(!b)return;current=b.dataset.stage;render()};document.getElementById('dlList').onclick=e=>{const card=e.target.closest('[data-id]'),btn=e.target.closest('[data-action]');if(!card||!btn)return;const id=card.dataset.id;if(btn.dataset.action==='project'){localStorage.setItem('ep-current-project-id',id);window.location.assign('project-detail.html')}else toast('상담 요청 기능은 공급사 연결 단계에서 활성화됩니다.')};document.getElementById('dlHelp').onclick=()=>toast('견적이 도착하면 포함 범위와 별도 공사를 먼저 확인해 주세요.');render();
  });
  </script>
</body>
</html>
