<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>비밀번호 재설정 · 이피랑</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>

  <style>
    :root{
      --primary:#16a34a;
      --primary-dark:#15803d;
      --primary-soft:#ecfdf5;
      --text:#172033;
      --sub:#667085;
      --muted:#98a2b3;
      --line:#e4e7ec;
      --danger:#dc2626;
      --danger-soft:#fef2f2;
      --success:#15803d;
      --success-soft:#f0fdf4;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 50% -10%,rgba(34,197,94,.14),transparent 34%),
        linear-gradient(180deg,#f7fbf8 0%,#f8fafc 52%,#f3f6f4 100%);
    }

    button,input{font:inherit}

    .reset-main{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 20px;
      position:relative;
      overflow:hidden;
    }

    .reset-main::before,
    .reset-main::after{
      content:"";
      position:absolute;
      border-radius:50%;
      pointer-events:none;
    }

    .reset-main::before{
      width:240px;
      height:240px;
      left:-100px;
      top:12%;
      background:rgba(22,163,74,.06);
    }

    .reset-main::after{
      width:300px;
      height:300px;
      right:-140px;
      bottom:5%;
      background:rgba(74,222,128,.07);
    }

    .reset-card{
      position:relative;
      z-index:1;
      width:min(440px,100%);
      padding:36px 34px 30px;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(22,163,74,.14);
      border-radius:26px;
      box-shadow:
        0 24px 60px rgba(16,24,40,.10),
        0 6px 20px rgba(22,163,74,.06);
      backdrop-filter:blur(10px);
    }

    .logo{
      display:flex;
      justify-content:center;
      margin-bottom:28px;
    }

    .logo img{
      height:42px;
      max-width:180px;
      object-fit:contain;
    }

    .heading{
      text-align:center;
      margin-bottom:25px;
    }

    .heading h1{
      margin:0;
      font-size:27px;
      line-height:1.25;
      letter-spacing:-.04em;
      font-weight:900;
    }

    .heading p{
      margin:9px 0 0;
      font-size:13px;
      line-height:1.6;
      color:var(--sub);
    }

    .status{
      display:none;
      align-items:flex-start;
      gap:9px;
      margin-bottom:18px;
      padding:12px 13px;
      border-radius:12px;
      font-size:12px;
      line-height:1.55;
    }

    .status.show{display:flex}
    .status.error{background:var(--danger-soft);color:#b91c1c;border:1px solid #fecaca}
    .status.success{background:var(--success-soft);color:var(--success);border:1px solid #bbf7d0}
    .status.info{background:#f8fafc;color:var(--sub);border:1px solid var(--line)}
    .status .lucide{width:17px;height:17px;margin-top:2px;flex:none}

    .form{
      display:grid;
      gap:17px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-size:12px;
      color:#475467;
      font-weight:800;
    }

    .input-wrap{
      position:relative;
    }

    .input-wrap > i,.input-wrap > .lucide{
      position:absolute;
      left:15px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      font-size:14px;
      pointer-events:none;
    }

    .input-wrap input{
      width:100%;
      height:50px;
      border:1px solid #dfe4e8;
      border-radius:14px;
      background:#fff;
      padding:0 48px 0 43px;
      font-size:14px;
      color:var(--text);
      outline:none;
      transition:.18s;
    }

    .input-wrap input::placeholder{color:#b1b8c1}

    .input-wrap input:focus{
      border-color:#4ade80;
      box-shadow:0 0 0 4px rgba(34,197,94,.10);
    }

    .input-wrap:focus-within > i,.input-wrap:focus-within > .lucide{color:var(--primary)}

    .toggle-password{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:38px;
      height:38px;
      border:0;
      border-radius:10px;
      background:transparent;
      color:#98a2b3;
      cursor:pointer;
    }

    .toggle-password:hover{
      background:#f2f4f7;
      color:var(--primary-dark);
    }

    .caps-warning{
      display:none;
      margin-top:6px;
      color:#b45309;
      font-size:13px;
    }

    .caps-warning.show{display:block}

    .rules{
      margin:1px 0 0;
      padding:13px;
      border:1px solid #edf0f2;
      border-radius:13px;
      background:#fbfcfd;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 10px;
    }

    .rule{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      color:#98a2b3;
    }

    .rule .lucide{
      width:14px;
      color:#cbd5e1;
    }

    .rule.valid{
      color:#15803d;
      font-weight:700;
    }

    .rule.valid .lucide{color:#22c55e}

    .match-message{
      min-height:16px;
      font-size:13px;
      color:var(--danger);
    }

    .match-message.valid{color:var(--success)}

    .submit-button{
      width:100%;
      height:50px;
      margin-top:3px;
      border:0;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:14px;
      font-weight:850;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(22,163,74,.20);
      transition:.18s;
    }

    .submit-button:hover{background:var(--primary-dark);transform:translateY(-1px)}
    .submit-button:disabled{background:#a7d7b7;cursor:not-allowed;transform:none;box-shadow:none}

    .login-link{
      display:flex;
      justify-content:center;
      margin-top:21px;
      padding-top:19px;
      border-top:1px solid #edf0f2;
    }

    .login-link a{
      color:var(--primary-dark);
      font-size:13px;
      font-weight:800;
      text-decoration:none;
    }

    .login-link a:hover{text-decoration:underline}

    @media(max-width:520px){
      .reset-main{
        align-items:flex-start;
        padding:72px 16px 28px;
      }

      .reset-card{
        padding:30px 22px 26px;
        border-radius:22px;
      }

      .logo img{height:36px}
      .heading h1{font-size:24px}
      .rules{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <main class="reset-main">
    <section class="reset-card" aria-labelledby="resetTitle">
      <div class="logo">
        <img src="/img/logo.png" alt="이피랑 로고">
      </div>

      <div class="heading">
        <h1 id="resetTitle">비밀번호 재설정</h1>
        <p>새로 사용할 비밀번호를 입력해 주세요.</p>
      </div>

      <div class="status info show" id="statusBox">
        <i data-lucide="loader-circle"></i>
        <span id="statusText">재설정 링크를 확인하고 있습니다.</span>
      </div>

      <form class="form" id="resetForm" hidden>
        <div class="field">
          <label for="newPassword">새 비밀번호</label>
          <div class="input-wrap">
            <i data-lucide="lock-keyhole"></i>
            <input
              id="newPassword"
              type="password"
              required
              autocomplete="new-password"
              placeholder="새 비밀번호를 입력하세요"
            >
            <button
              class="toggle-password"
              type="button"
              data-target="newPassword"
              aria-label="비밀번호 표시"
            >
              <i data-lucide="eye"></i>
            </button>
          </div>
          <div class="caps-warning" id="capsWarning1">
            <i data-lucide="triangle-alert"></i>
            Caps Lock이 켜져 있습니다.
          </div>
        </div>

        <div class="rules">
          <div class="rule" id="ruleLength"><i data-lucide="circle"></i>8자 이상</div>
          <div class="rule" id="ruleLetter"><i data-lucide="circle"></i>영문 포함</div>
          <div class="rule" id="ruleNumber"><i data-lucide="circle"></i>숫자 포함</div>
          <div class="rule" id="ruleSpecial"><i data-lucide="circle"></i>특수문자 포함</div>
        </div>

        <div class="field">
          <label for="confirmPassword">비밀번호 확인</label>
          <div class="input-wrap">
            <i data-lucide="lock-keyhole"></i>
            <input
              id="confirmPassword"
              type="password"
              required
              autocomplete="new-password"
              placeholder="비밀번호를 다시 입력하세요"
            >
            <button
              class="toggle-password"
              type="button"
              data-target="confirmPassword"
              aria-label="비밀번호 표시"
            >
              <i data-lucide="eye"></i>
            </button>
          </div>
          <div class="caps-warning" id="capsWarning2">
            <i data-lucide="triangle-alert"></i>
            Caps Lock이 켜져 있습니다.
          </div>
          <div class="match-message" id="matchMessage"></div>
        </div>

        <button class="submit-button" id="submitButton" type="submit">
          비밀번호 변경
        </button>
      </form>

      <div class="login-link">
        <a href="/hub/login.html">
          <i data-lucide="arrow-left"></i>
          로그인으로 돌아가기
        </a>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://jotgygpobwvswasgbage.supabase.co';
    const SUPABASE_ANON_KEY =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvdGd5Z3BvYnd2c3dhc2diYWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODU4MzIsImV4cCI6MjA5NDQ2MTgzMn0.GCPW_viKskyoR7Nd1NbrSULJbouOBSFFtJdQQi6zDBE';

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const statusBox = document.querySelector('#statusBox');
    const statusText = document.querySelector('#statusText');
    const resetForm = document.querySelector('#resetForm');
    const newPassword = document.querySelector('#newPassword');
    const confirmPassword = document.querySelector('#confirmPassword');
    const submitButton = document.querySelector('#submitButton');
    const matchMessage = document.querySelector('#matchMessage');

    let recoveryReady = false;

    function renderLucide(){if(window.lucide)window.lucide.createIcons();}
    function showStatus(type, message, iconName) {
      statusBox.className = `status ${type} show`;
      statusBox.innerHTML = `
        <i data-lucide="${iconName}"></i>
        <span>${message}</span>
      `; renderLucide();
    }

    function setRule(id, valid) {
      const element = document.querySelector(id);
      element.classList.toggle('valid', valid);
      const icon=element.querySelector('svg,i');
      const replacement=document.createElement('i');
      replacement.dataset.lucide=valid?'circle-check':'circle';
      icon.replaceWith(replacement);
      renderLucide();
    }

    function validatePassword() {
      const value = newPassword.value;

      const conditions = {
        length: value.length >= 8,
        letter: /[A-Za-z]/.test(value),
        number: /[0-9]/.test(value),
        special: /[^A-Za-z0-9]/.test(value)
      };

      setRule('#ruleLength', conditions.length);
      setRule('#ruleLetter', conditions.letter);
      setRule('#ruleNumber', conditions.number);
      setRule('#ruleSpecial', conditions.special);

      const matches =
        confirmPassword.value.length > 0 &&
        value === confirmPassword.value;

      if (!confirmPassword.value) {
        matchMessage.textContent = '';
        matchMessage.className = 'match-message';
      } else if (matches) {
        matchMessage.textContent = '비밀번호가 일치합니다.';
        matchMessage.className = 'match-message valid';
      } else {
        matchMessage.textContent = '비밀번호가 일치하지 않습니다.';
        matchMessage.className = 'match-message';
      }

      return Object.values(conditions).every(Boolean) && matches;
    }

    function handleCapsLock(event, warningId) {
      const warning = document.querySelector(warningId);
      warning.classList.toggle(
        'show',
        Boolean(event.getModifierState && event.getModifierState('CapsLock'))
      );
    }

    document.querySelectorAll('.toggle-password').forEach(button => {
      button.addEventListener('click', () => {
        const input = document.querySelector(`#${button.dataset.target}`);
        const icon = button.querySelector('svg,i');
        const showing = input.type === 'text';

        input.type = showing ? 'password' : 'text';
        const replacement=document.createElement('i');
        replacement.dataset.lucide=showing?'eye':'eye-off';
        icon.replaceWith(replacement);renderLucide();

        button.setAttribute(
          'aria-label',
          showing ? '비밀번호 표시' : '비밀번호 숨기기'
        );
      });
    });

    newPassword.addEventListener('input', validatePassword);
    confirmPassword.addEventListener('input', validatePassword);

    newPassword.addEventListener('keyup', event =>
      handleCapsLock(event, '#capsWarning1')
    );
    confirmPassword.addEventListener('keyup', event =>
      handleCapsLock(event, '#capsWarning2')
    );

    async function prepareRecoverySession() {
      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        let session = null;

        const current = await supabaseClient.auth.getSession();
        session = current.data.session;

        if (!session && code) {
          const exchanged =
            await supabaseClient.auth.exchangeCodeForSession(code);

          if (exchanged.error) throw exchanged.error;
          session = exchanged.data.session;
        }

        if (!session) {
          await new Promise(resolve => setTimeout(resolve, 700));
          const retry = await supabaseClient.auth.getSession();
          session = retry.data.session;
        }

        if (!session) {
          throw new Error('유효한 비밀번호 재설정 세션을 찾을 수 없습니다.');
        }

        recoveryReady = true;
        showStatus(
          'success',
          '재설정 링크가 확인되었습니다. 새 비밀번호를 입력해 주세요.',
          'circle-check'
        );
        resetForm.hidden = false;
        newPassword.focus();
      } catch (error) {
        console.error(error);

        recoveryReady = false;
        resetForm.hidden = true;

        showStatus(
          'error',
          '재설정 링크가 만료되었거나 올바르지 않습니다. 비밀번호 재설정 메일을 다시 요청해 주세요.',
          'circle-alert'
        );
      }
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (
        event === 'PASSWORD_RECOVERY' &&
        session &&
        !recoveryReady
      ) {
        recoveryReady = true;

        showStatus(
          'success',
          '재설정 링크가 확인되었습니다. 새 비밀번호를 입력해 주세요.',
          'circle-check'
        );

        resetForm.hidden = false;
      }
    });

    resetForm.addEventListener('submit', async event => {
      event.preventDefault();

      if (!recoveryReady) {
        showStatus(
          'error',
          '재설정 세션을 확인할 수 없습니다. 이메일 링크를 다시 열어 주세요.',
          'circle-alert'
        );
        return;
      }

      if (!validatePassword()) {
        showStatus(
          'error',
          '비밀번호 조건과 일치 여부를 확인해 주세요.',
          'circle-alert'
        );
        return;
      }

      submitButton.disabled = true;
      submitButton.innerHTML =
        '<i data-lucide="loader-circle"></i> 변경 중'; renderLucide();

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword.value
      });

      if (error) {
        console.error(error);

        submitButton.disabled = false;
        submitButton.textContent = '비밀번호 변경';

        showStatus(
          'error',
          `비밀번호 변경에 실패했습니다. ${error.message}`,
          'circle-alert'
        );
        return;
      }

      resetForm.hidden = true;

      showStatus(
        'success',
        '비밀번호가 변경되었습니다. 3초 후 로그인 페이지로 이동합니다.',
        'circle-check'
      );

      await supabaseClient.auth.signOut();

      setTimeout(() => {
        window.location.replace('/hub/login.html');
      }, 3000);
    });

    renderLucide();
    prepareRecoverySession();
  </script>
</body>
</html>
