<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>회원 관리 · 이피랑 운영센터</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/hub.css">
</head>
<body>
<div class="hub-shell">

<aside class="hub-sidebar" id="hubSidebar">
  <div class="hub-brand">
    <img src="../img/logo.png" alt="이피랑">
    <span class="hub-brand-title">운영센터</span>
  </div>
  <div class="nav-label">Overview</div>
  <nav class="hub-nav">
    <a href="index.html" data-page="dashboard"><i class="fa-solid fa-chart-pie"></i><span>대시보드</span></a>
  </nav>
  <div class="nav-label">Management</div>
  <nav class="hub-nav">
    <a href="members.html" data-page="members"><i class="fa-solid fa-users"></i><span>회원 관리</span><span class="nav-count" id="navMemberCount">-</span></a>
    <a href="projects.html" data-page="projects"><i class="fa-solid fa-diagram-project"></i><span>프로젝트 관리</span><span class="nav-count" id="navProjectCount">-</span></a>
    <a href="surveys.html" data-page="surveys"><i class="fa-solid fa-clipboard-list"></i><span>설문 관리</span><span class="nav-count" id="navSurveyCount">-</span></a>
    <a href="templates.html" data-page="templates"><i class="fa-solid fa-wand-magic-sparkles"></i><span>추천안 관리</span><span class="nav-count" id="navTemplateCount">-</span></a>
  </nav>
  <div class="nav-label">Insight</div>
  <nav class="hub-nav">
    <a href="analytics.html" data-page="analytics"><i class="fa-solid fa-chart-column"></i><span>통계·리포트</span></a>
    <a href="settings.html" data-page="settings"><i class="fa-solid fa-gear"></i><span>운영센터 설정</span></a>
  </nav>
  <div class="sidebar-help">
    <strong>이피랑 운영센터</strong>
    <p>회원·프로젝트·추천 데이터를 한곳에서 관리합니다.</p>
    <button class="btn btn-soft btn-sm" id="btnHome"><i class="fa-solid fa-arrow-up-right-from-square"></i> 사용자 앱</button>
  </div>
  <div class="hub-user">
    <div class="hub-user-row">
      <div class="user-avatar" id="hubUserInitial">A</div>
      <div><strong id="hubUserName">관리자</strong><span id="hubUserEmail"></span></div>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-ghost btn-sm" onclick="location.href='settings.html'"><i class="fa-solid fa-user-gear"></i> 내 정보</button>
      <button class="btn btn-danger btn-sm" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
    </div>
  </div>
</aside>
<div class="overlay" id="mobileOverlay"></div>

<div class="hub-content">

<header class="hub-topbar">
  <div class="topbar-left">
    <button class="top-icon-btn mobile-menu" id="mobileMenu"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="운영센터 빠른 검색"></div>
  </div>
  <div class="topbar-right">
    <span class="role-pill" id="hubRole">관리자</span>
    <button class="top-icon-btn" title="새로고침" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></button>
  </div>
</header>

<main class="hub-main">
  <div class="page-head">
    <div><h1>회원 관리</h1><p>회원 기본정보, 가입 유형, 계정 상태와 운영 권한을 관리합니다.</p></div>
  </div>
  
<div class="toolbar">
  <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input id="memberSearch" placeholder="이름, 이메일, 전화번호, 지역 검색"></div>
  <select class="control" id="memberType"><option value="">전체 회원유형</option><option value="young">청년농</option><option value="successor">후계농</option><option value="return">귀농예정</option><option value="other">일반창업자</option></select>
  <select class="control" id="memberRole"><option value="">전체 권한</option><option value="user">회원</option><option value="manager">매니저</option><option value="admin">관리자</option><option value="super_admin">최고관리자</option></select>
  <select class="control" id="memberStatus"><option value="">전체 상태</option><option value="true">활성</option><option value="false">비활성</option></select>
  <span class="count-text" id="memberCount">0명</span>
</div>
<div class="table-card"><div class="table-wrap"><table><thead><tr><th>회원</th><th>연락처</th><th>유형</th><th>지역</th><th>프로젝트</th><th>권한</th><th>상태</th><th>가입일</th><th></th></tr></thead><tbody id="memberRows"></tbody></table></div></div>
<div class="modal-backdrop" id="memberModal"><div class="modal modal-lg">
  <div class="modal-head"><div><h2 id="memberModalTitle">회원 상세</h2><p>회원 정보와 권한을 관리합니다.</p></div><button class="modal-close" data-close="memberModal"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="detail-grid" id="memberDetail"></div>
  <form id="memberForm">
    <input type="hidden" id="editMemberId">
    <div class="form-grid" style="margin-top:18px">
      <div class="field"><label>이름</label><input id="editMemberName"></div>
      <div class="field"><label>농장명</label><input id="editMemberFarm"></div>
      <div class="field"><label>권한</label><select id="editMemberRole"><option value="user">회원</option><option value="manager">매니저</option><option value="admin">관리자</option><option value="super_admin">최고관리자</option></select></div>
      <div class="field"><label>계정 상태</label><select id="editMemberActive"><option value="true">활성</option><option value="false">비활성</option></select></div>
    </div>
    <div class="modal-actions"><button type="button" class="btn btn-ghost" data-close="memberModal">취소</button><button class="btn btn-primary">저장</button></div>
  </form>
</div></div>

</main>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="js/hub.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>Hub.members());</script>
</body></html>
