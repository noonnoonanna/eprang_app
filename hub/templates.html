<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>추천안 관리 · 이피랑 운영센터</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/hub.css">
</head>
<body>
<div class="hub-shell">

<aside class="hub-sidebar" id="hubSidebar">
  <div class="hub-brand">
    <img src="../img/logo.png" alt="이피랑">
    <span class="hub-brand-title">운영센터</span>
  </div>
  <div class="nav-label">Overview</div>
  <nav class="hub-nav">
    <a href="index.html" data-page="dashboard"><i class="fa-solid fa-chart-pie"></i><span>대시보드</span></a>
  </nav>
  <div class="nav-label">Management</div>
  <nav class="hub-nav">
    <a href="members.html" data-page="members"><i class="fa-solid fa-users"></i><span>회원 관리</span><span class="nav-count" id="navMemberCount">-</span></a>
    <a href="projects.html" data-page="projects"><i class="fa-solid fa-diagram-project"></i><span>프로젝트 관리</span><span class="nav-count" id="navProjectCount">-</span></a>
    <a href="surveys.html" data-page="surveys"><i class="fa-solid fa-clipboard-list"></i><span>설문 관리</span><span class="nav-count" id="navSurveyCount">-</span></a>
    <a href="templates.html" data-page="templates"><i class="fa-solid fa-wand-magic-sparkles"></i><span>추천안 관리</span><span class="nav-count" id="navTemplateCount">-</span></a>
  </nav>
  <div class="nav-label">Insight</div>
  <nav class="hub-nav">
    <a href="analytics.html" data-page="analytics"><i class="fa-solid fa-chart-column"></i><span>통계·리포트</span></a>
    <a href="settings.html" data-page="settings"><i class="fa-solid fa-gear"></i><span>운영센터 설정</span></a>
  </nav>
  <div class="sidebar-help">
    <strong>이피랑 운영센터</strong>
    <p>회원·프로젝트·추천 데이터를 한곳에서 관리합니다.</p>
    <button class="btn btn-soft btn-sm" id="btnHome"><i class="fa-solid fa-arrow-up-right-from-square"></i> 사용자 앱</button>
  </div>
  <div class="hub-user">
    <div class="hub-user-row">
      <div class="user-avatar" id="hubUserInitial">A</div>
      <div><strong id="hubUserName">관리자</strong><span id="hubUserEmail"></span></div>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-ghost btn-sm" onclick="location.href='settings.html'"><i class="fa-solid fa-user-gear"></i> 내 정보</button>
      <button class="btn btn-danger btn-sm" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
    </div>
  </div>
</aside>
<div class="overlay" id="mobileOverlay"></div>

<div class="hub-content">

<header class="hub-topbar">
  <div class="topbar-left">
    <button class="top-icon-btn mobile-menu" id="mobileMenu"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="운영센터 빠른 검색"></div>
  </div>
  <div class="topbar-right">
    <span class="role-pill" id="hubRole">관리자</span>
    <button class="top-icon-btn" title="새로고침" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></button>
  </div>
</header>

<main class="hub-main">
  <div class="page-head">
    <div><h1>추천안 관리</h1><p>AI 추천에 사용하는 설계 템플릿과 점수·태그를 관리합니다.</p></div>
  </div>
  
<div class="page-actions" style="justify-content:flex-end;margin-top:-65px;margin-bottom:24px"><button class="btn btn-primary" id="btnNewTemplate"><i class="fa-solid fa-plus"></i> 추천안 추가</button></div>
<div class="toolbar">
  <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input id="templateSearch" placeholder="추천안명, 코드, 작목, 태그 검색"></div>
  <select class="control" id="templateEstimatable"><option value="">전체 유형</option><option value="true">견적 가능</option><option value="false">상담 필요</option></select>
  <span class="count-text" id="templateCount">0개</span>
</div>
<div class="table-card"><div class="table-wrap"><table><thead><tr><th>추천안</th><th>작목</th><th>시설유형</th><th>투자범위</th><th>인원</th><th>AI 점수</th><th>견적</th><th></th></tr></thead><tbody id="templateRows"></tbody></table></div></div>
<div class="modal-backdrop" id="templateModal"><div class="modal modal-lg">
  <div class="modal-head"><div><h2 id="templateModalTitle">추천안 관리</h2><p>추천 카드와 AI 기본 점수를 관리합니다.</p></div><button class="modal-close" data-close="templateModal"><i class="fa-solid fa-xmark"></i></button></div>
  <form id="templateForm">
    <input type="hidden" id="editTemplateId">
    <div class="form-grid">
      <div class="field"><label>코드</label><input id="editTemplateCode" required></div>
      <div class="field"><label>추천안명</label><input id="editTemplateTitle" required></div>
      <div class="field"><label>작목</label><input id="editTemplateCrop"></div>
      <div class="field"><label>시설 유형</label><input id="editTemplateFacility"></div>
      <div class="field"><label>투자 범위</label><input id="editTemplateInvest"></div>
      <div class="field"><label>운영 인원</label><input id="editTemplateStaff"></div>
      <div class="field"><label>AI 기본 점수</label><input type="number" id="editTemplateScore"></div>
      <div class="field"><label>난이도</label><input type="number" min="1" max="5" id="editTemplateDifficulty"></div>
      <div class="field"><label>견적 여부</label><select id="editTemplateEstimatable"><option value="true">견적 가능</option><option value="false">상담 필요</option></select></div>
      <div class="field"><label>태그</label><input id="editTemplateTags" placeholder="stable, premium, fulltime"></div>
      <div class="field full"><label>설명</label><textarea id="editTemplateDescription"></textarea></div>
    </div>
    <div class="modal-actions"><button type="button" class="btn btn-ghost" data-close="templateModal">취소</button><button class="btn btn-primary">저장</button></div>
  </form>
</div></div>

</main>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="js/hub.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>Hub.templates());</script>
</body></html>
