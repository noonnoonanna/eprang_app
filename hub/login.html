<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>로그인 · 이피랑</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/hub.css">
</head>
<body class="hub-login-page">
  <main class="hub-login-main">
    <section class="hub-login-card" aria-labelledby="loginTitle">
      <div class="hub-login-logo">
        <img src="../img/logo.png" alt="이피랑 로고">
      </div>

      <div class="hub-login-heading">
        <h1 id="loginTitle">로그인</h1>
        <p>관리자 계정으로 접속해 주세요.</p>
      </div>

      <form class="hub-login-form" onsubmit="Hub.login(event)">
        <div class="field">
          <label for="loginEmail">이메일</label>
          <div class="input-with-icon">
            <i class="fa-regular fa-envelope"></i>
            <input
              id="loginEmail"
              type="email"
              name="email"
              required
              autocomplete="username"
              placeholder="이메일을 입력하세요"
            >
          </div>
        </div>

        <div class="field">
          <label for="loginPassword">비밀번호</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-lock"></i>
            <input
              id="loginPassword"
              type="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="비밀번호를 입력하세요"
            >
          </div>
        </div>

        <button class="btn btn-primary hub-login-button" type="submit">
          로그인
        </button>
      </form>

      <div class="hub-login-security">
        <i class="fa-solid fa-shield-halved"></i>
        <span>권한이 등록된 계정만 접속할 수 있습니다.</span>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="js/hub.js"></script>
</body>
</html>
