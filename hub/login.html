<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>로그인 · 이피랑 운영센터</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/hub.css">
</head>
<body>
<div class="login-shell">
  <section class="login-visual">
    <div class="login-brand"><img src="../img/logo.png" alt="이피랑"></div>
    <div class="login-copy">
      <h1>이피랑의 운영을<br>한곳에서 관리하세요.</h1>
      <p>회원, 설문, 추천안, 프로젝트 진행상태를 실시간으로 확인하고 운영 데이터를 체계적으로 관리합니다.</p>
      <div class="login-features">
        <div class="login-feature"><i class="fa-solid fa-users"></i> 회원·권한 관리</div>
        <div class="login-feature"><i class="fa-solid fa-diagram-project"></i> 프로젝트 현황</div>
        <div class="login-feature"><i class="fa-solid fa-chart-column"></i> 운영 통계</div>
        <div class="login-feature"><i class="fa-solid fa-shield-halved"></i> RLS 기반 보안</div>
      </div>
    </div>
    <small>© EPRANG Operations Center</small>
  </section>
  <section class="login-panel">
    <div class="login-card">
      <h2>운영센터 로그인</h2>
      <p>관리자 권한이 부여된 계정으로 로그인해 주세요.</p>
      <form onsubmit="Hub.login(event)">
        <div class="field"><label>이메일</label><input type="email" name="email" required autocomplete="username" placeholder="admin@example.com"></div>
        <div class="field"><label>비밀번호</label><input type="password" name="password" required autocomplete="current-password" placeholder="비밀번호"></div>
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-lock"></i> 운영센터 로그인</button>
      </form>
      <div class="login-note">일반 회원 계정으로는 접근할 수 없습니다.</div>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script src="js/hub.js"></script>
</body></html>
