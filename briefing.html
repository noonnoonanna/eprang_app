<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>이피랑 - 데이터 브리핑</title>
  <style>
    :root{--g:#16a34a;--gd:#126b34;--ink:#17221b;--sub:#64748b;--line:#e2e9e4;--soft:#f3f8f4}
    body[data-page=briefing]{background:#f6f8f7;color:var(--ink)}body[data-page=briefing] main{display:block;max-width:480px;margin:auto;padding:18px 14px 112px}.head{margin:0 2px 16px}.head h1{margin:0 0 5px;font-size:22px;letter-spacing:-.04em}.head p{margin:0;color:var(--sub);font-size:12px;line-height:1.55}.picker{position:relative;margin-bottom:14px}.picker select{width:100%;height:48px;padding:0 42px 0 14px;appearance:none;border:1px solid #dce5df;border-radius:15px;background:#fff;font-size:12px;font-weight:650;color:#26332b;box-shadow:0 5px 15px #0f172a0a}.picker>svg{position:absolute;right:15px;top:16px;width:16px;color:#64748b;pointer-events:none}
    .card{margin-bottom:14px;padding:16px;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:0 7px 20px #0f172a0b}.title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}.title{display:flex;align-items:center;gap:7px;margin:0;font-size:14px}.title svg{width:16px;color:var(--g)}.meta{font-size:9px;color:#94a3b8}
    .hero{position:relative;overflow:hidden;padding:18px;border-radius:17px;background:linear-gradient(145deg,#193426,#0f2118);color:#fff}.hero:after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;right:-65px;top:-85px;background:#25b85b33}.eyebrow{display:flex;align-items:center;gap:6px;margin-bottom:9px;color:#7ee2a1;font-size:9px;font-weight:700}.eyebrow svg{width:13px}.hero h2{margin:0 0 6px;font-size:17px;line-height:1.45;letter-spacing:-.03em}.hero p{margin:0 0 15px;color:#b7c7bc;font-size:10px;line-height:1.55}.hero-chips{display:flex;flex-wrap:wrap;gap:6px}.hero-chip{padding:6px 8px;border:1px solid #ffffff24;border-radius:8px;background:#ffffff0d;font-size:9px;color:#eaf4ed}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{min-height:92px;padding:12px;border:1px solid #e5ebe7;border-radius:14px;background:#fbfcfb}.kpi:first-child{background:#effaf2;border-color:#cfead6}.kpi-label{display:flex;align-items:center;gap:5px;margin-bottom:9px;color:#7a8b80;font-size:9px;font-weight:650}.kpi-label svg{width:13px}.kpi strong{display:block;color:#27382d;font-size:14px;line-height:1.35;letter-spacing:-.02em}.kpi:first-child strong{color:#14773a}.kpi small{display:block;margin-top:5px;color:#94a3b8;font-size:8px;line-height:1.4}
    .case-list{display:grid;gap:9px}.case{padding:13px;border:1px solid #e5ebe7;border-radius:15px;background:#fbfcfb}.case:first-child{border-color:#9edeb1;background:#f1fbf4}.case-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.rank{display:flex;align-items:center;gap:5px;margin-bottom:4px;color:#168040;font-size:9px;font-weight:750}.rank svg{width:12px}.case h3{margin:0;font-size:13px;line-height:1.4}.fit{flex:none;padding:5px 7px;border-radius:7px;background:#dcfce7;color:#15803d;font-size:8px;font-weight:700}.numbers{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}.number{padding:9px;border-radius:10px;background:#fff;border:1px solid #e7ece9}.number span{display:block;margin-bottom:3px;color:#94a3b8;font-size:8px}.number strong{font-size:10px;color:#35463b}.reason{display:flex;gap:6px;margin:9px 0 0;color:#607166;font-size:9px;line-height:1.5}.reason svg{width:12px;flex:none;color:#16a34a;margin-top:1px}
    .factor-list{display:grid;gap:7px}.factor{display:flex;gap:10px;padding:11px;border-radius:13px;background:#f7faf8}.factor>svg{width:15px;flex:none;color:#16a34a}.factor strong{display:block;margin-bottom:2px;font-size:10px}.factor p{margin:0;color:#718078;font-size:9px;line-height:1.5}.notice{display:flex;gap:8px;margin-top:11px;padding:11px;border-radius:12px;background:#fff8e8;color:#7b6132;font-size:9px;line-height:1.55}.notice svg{width:14px;flex:none;color:#d6951b}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions button{height:41px;border-radius:10px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}.actions svg{width:14px}.outline{border:1px solid #d8e2dc;background:#fff;color:#526158}.primary{border:0;background:#16a34a;color:#fff;box-shadow:0 3px 0 #0f7433}.empty{padding:30px 18px;border:1px dashed #cbd8cf;border-radius:18px;background:#fbfdfb;text-align:center;color:#728078;font-size:12px;line-height:1.6}.empty svg{display:block;width:27px;margin:0 auto 10px}.empty button{margin-top:13px;padding:10px 14px;border:0;border-radius:9px;background:#16a34a;color:#fff}.tabs .lucide{width:20px;height:20px;stroke-width:1.8}
  </style>
</head>
<body data-page="briefing"><div class="app">
  <header>
			<div class="bar">
				<div class="logo"><a href="home.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
			</div>
		</header>
  <main><div class="head"><h1>데이터 브리핑</h1><p>나와 비슷한 조건의 설계 데이터를 비교해 예상 비용과 수익을 살펴보세요.</p></div><div class="picker" id="pickerWrap"><select id="projectPicker"><option>프로젝트를 불러오는 중입니다.</option></select><i data-lucide="chevron-down"></i></div><div id="content"><div class="empty">분석 데이터를 불러오는 중입니다.</div></div></main>
  <nav class="tabs"><ul><li><button onclick="location.assign('home.html')"><i data-lucide="house"></i><small>홈</small></button></li><li><button onclick="location.assign('records.html')"><i data-lucide="list-checks"></i><small>기록</small></button></li><li><button onclick="location.assign('deals.html')"><i data-lucide="file-signature"></i><small>견적</small></button></li><li><button onclick="location.assign('settings.html')"><i data-lucide="user"></i><small>마이</small></button></li></ul></nav>
</div><script src="app.js" defer></script><script>
document.addEventListener('DOMContentLoaded',async()=>{
 const picker=document.getElementById('projectPicker'),content=document.getElementById('content');let projects=[],surveys=[],templates=[];
 const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const icons=()=>window.lucide&&lucide.createIcons();
 const area=s=>Number(s.usable_area||s.floor_area||0);const facility=v=>({biz_center:'지식산업센터',panel_factory:'판넬형 창고·공장',retail_space:'상가·근린시설'}[v]||'실내 공간');const work=v=>({lt10:'주 10시간 미만',h10_20:'주 10~20시간',h20_40:'주 20~40시간',fulltime:'상근 운영'}[v]||v||'미입력');
 try{const {data:{session}}=await supabaseClient.auth.getSession();if(session){const pr=await supabaseClient.from('projects').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false});if(pr.error)throw pr.error;projects=pr.data||[];if(projects.length){const sr=await supabaseClient.from('project_surveys').select('*').in('project_id',projects.map(p=>p.id));surveys=sr.data||[]}}const tr=await supabaseClient.from('reco_templates').select('*');templates=tr.data||[]}catch(e){console.error('브리핑 조회 오류',e)}
 if(!projects.length){document.getElementById('pickerWrap').style.display='none';content.innerHTML='<div class="empty"><i data-lucide="folder-plus"></i>분석할 프로젝트가 없습니다.<br>설문을 완료하고 설계안을 저장해 주세요.<button onclick="location.assign(\'survey_new.html\')">새 프로젝트 만들기</button></div>';icons();return}
 picker.innerHTML=projects.map(p=>'<option value="'+esc(p.id)+'">'+esc(p.name||'이름 없는 프로젝트')+'</option>').join('');const saved=localStorage.getItem('ep-current-project-id');if(saved&&projects.some(p=>String(p.id)===saved))picker.value=saved;
 function rank(t,s){let n=0,r=[];const tags=Array.isArray(t.tags)?t.tags:[],a=area(s),min=Number(t.recommended_area_min||0),max=Number(t.recommended_area_max||0);if(a&&((!min||a>=min)&&(!max||a<=max))){n+=35;r.push('입력한 면적과 권장 면적이 잘 맞아요.')}if(s.ceil_height&&t.recommended_height&&Number(s.ceil_height)>=Number(t.recommended_height)){n+=15;r.push('현재 층고에서 적용하기 좋은 구성입니다.')}if(s.work_hours==='lt10'&&tags.includes('parttime')){n+=20;r.push('짧은 운영 시간에 적합한 유형이에요.')}if(s.work_type==='fulltime'&&tags.includes('fulltime')){n+=18;r.push('상근 운영 조건과 유사합니다.')}if(Number(s.family_staff)>=2&&tags.includes('family')){n+=15;r.push('가족 인력 운영 조건과 잘 맞아요.')}if(s.facility==='biz_center'&&tags.includes('biz_center')){n+=18;r.push('시설 유형이 동일한 설계입니다.')}if(s.profit_goal==='high'&&tags.includes('high_profit')){n+=15;r.push('높은 목표 수익을 고려한 유형이에요.')}if(t.estimated_monthly_profit)n+=8;if(t.invest)n+=5;if(!r.length)r.push('시설·운영 조건이 전반적으로 유사한 설계입니다.');return{n,r}}
 function render(){const p=projects.find(x=>String(x.id)===picker.value)||projects[0],s=surveys.find(x=>String(x.project_id)===String(p.id))||{},matched=templates.map(t=>({...t,m:rank(t,s)})).filter(t=>t.invest||t.estimated_monthly_profit).sort((a,b)=>b.m.n-a.m.n).slice(0,3),withProfit=matched.filter(x=>x.estimated_monthly_profit),invest=[...new Set(matched.map(x=>x.invest).filter(Boolean))],profits=[...new Set(withProfit.map(x=>x.estimated_monthly_profit))],staff=[...new Set(matched.map(x=>x.staff).filter(Boolean))];
  const cases=matched.length?matched.map((t,i)=>'<article class="case"><div class="case-top"><div><div class="rank"><i data-lucide="'+(i?'bar-chart-3':'badge-check')+'"></i>유사 설계 '+(i+1)+'</div><h3>'+esc(t.title)+'</h3></div><span class="fit">'+(i?'비교안':'가장 유사')+'</span></div><div class="numbers"><div class="number"><span>예상 투자 규모</span><strong>'+esc(t.invest||'상담 후 산정')+'</strong></div><div class="number"><span>예상 월수익</span><strong>'+esc(t.estimated_monthly_profit||'데이터 준비 중')+'</strong></div><div class="number"><span>권장 면적</span><strong>'+esc(t.recommended_area_min||'-')+'~'+esc(t.recommended_area_max||'-')+'㎡</strong></div><div class="number"><span>적정 인력</span><strong>'+esc(t.staff||'상담 후 산정')+'</strong></div></div><p class="reason"><i data-lucide="circle-check"></i>'+esc(t.m.r[0])+'</p></article>').join(''):'<div class="empty">비교할 추천 템플릿 데이터가 없습니다.</div>';
  content.innerHTML='<section class="card"><div class="hero"><div class="eyebrow"><i data-lucide="scan-search"></i>유사 조건 분석</div><h2>'+esc(p.name||'내 프로젝트')+'</h2><p>추천 설계 템플릿 '+matched.length+'개를 면적·시설·인력·운영 조건으로 비교했어요.</p><div class="hero-chips"><span class="hero-chip">'+esc(facility(s.facility))+'</span><span class="hero-chip">'+(area(s)?area(s)+'㎡':'면적 미입력')+'</span><span class="hero-chip">'+esc(work(s.work_hours))+'</span><span class="hero-chip">'+esc(s.family_staff?s.family_staff+'명':'인력 미입력')+'</span></div></div></section><section class="card"><div class="title-row"><h2 class="title"><i data-lucide="wallet-cards"></i>비용·수익 한눈에 보기</h2><span class="meta">유사 설계 기준</span></div><div class="kpis"><div class="kpi"><span class="kpi-label"><i data-lucide="coins"></i>초기 투자비</span><strong>'+esc(invest[0]||'산정 준비 중')+'</strong><small>'+(invest.length>1?'비교안에 따라 '+esc(invest[invest.length-1])+'까지':'가장 유사한 설계 기준')+'</small></div><div class="kpi"><span class="kpi-label"><i data-lucide="trending-up"></i>예상 월수익</span><strong>'+esc(profits[0]||'데이터 준비 중')+'</strong><small>'+withProfit.length+'개 수익 데이터 반영</small></div><div class="kpi"><span class="kpi-label"><i data-lucide="users"></i>적정 운영 인력</span><strong>'+esc(staff[0]||'상담 후 산정')+'</strong><small>설비 자동화 수준에 따라 변동</small></div><div class="kpi"><span class="kpi-label"><i data-lucide="layers-3"></i>비교 설계안</span><strong>'+matched.length+'개</strong><small>현재 입력 조건과 가까운 순서</small></div></div></section><section class="card"><div class="title-row"><h2 class="title"><i data-lucide="git-compare-arrows"></i>비슷한 설계 비교</h2><span class="meta">상위 '+matched.length+'개</span></div><div class="case-list">'+cases+'</div></section><section class="card"><div class="title-row"><h2 class="title"><i data-lucide="sliders-horizontal"></i>결과를 바꾸는 조건</h2></div><div class="factor-list"><div class="factor"><i data-lucide="zap"></i><div><strong>전력·공조 비용</strong><p>LED 사용시간과 냉난방·제습 부하가 월 운영비에 큰 영향을 줍니다.</p></div></div><div class="factor"><i data-lucide="badge-dollar-sign"></i><div><strong>판매 단가와 판로</strong><p>도매·직거래·정기 납품 비중에 따라 실제 매출이 달라집니다.</p></div></div><div class="factor"><i data-lucide="gauge"></i><div><strong>가동률과 폐기율</strong><p>초기 운영 안정화 기간과 상품화율을 함께 고려해야 합니다.</p></div></div></div><div class="notice"><i data-lucide="info"></i>추천 템플릿의 예상 범위이며 실제 사용자 실적이나 수익 보장이 아닙니다. 임대료·인건비·전기료·판매단가와 현장 조건에 따라 달라질 수 있어요.</div></section><section class="card"><div class="actions"><button class="outline" onclick="location.assign(\'recipes.html\')"><i data-lucide="layers-3"></i>설비 구성 보기</button><button class="primary" onclick="location.assign(\'deals.html?project='+encodeURIComponent(p.id)+'\')"><i data-lucide="file-signature"></i>실제 견적 확인</button></div></section>';icons()}
 picker.onchange=()=>{localStorage.setItem('ep-current-project-id',picker.value);render()};render();icons();
});
</script></body></html>
