<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <title>이피랑 - 데이터 브리핑</title>
  <style>
    :root{--br-green:#16a34a;--br-dark:#17221b;--br-sub:#64748b;--br-line:#e1e8e4}
    body[data-page="briefing"]{background:#f6f8f7;color:var(--br-dark)}
    body[data-page="briefing"] main{display:block;width:100%;max-width:480px;margin:0 auto;padding:18px 14px 110px}
    .br-head{margin:0 2px 16px}.br-head h1{margin:0 0 4px;font-size:21px;font-weight:740;letter-spacing:-.035em}.br-head p{margin:0;color:var(--br-sub);font-size:12px;line-height:1.5}
    .project-picker{position:relative;margin-bottom:14px}.project-picker select{width:100%;height:48px;padding:0 42px 0 14px;border:1px solid #dce5df;border-radius:15px;background:#fff;color:#26332b;font-size:12px;font-weight:650;appearance:none;box-shadow:0 5px 15px rgba(15,23,42,.04)}.project-picker .lucide{position:absolute;right:15px;top:50%;width:16px;height:16px;color:#64748b;transform:translateY(-50%);pointer-events:none}
    .br-section{margin-bottom:14px;padding:16px;border:1px solid var(--br-line);border-radius:20px;background:#fff;box-shadow:0 7px 20px rgba(15,23,42,.05)}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.section-title{display:flex;align-items:center;gap:7px;margin:0;color:#26332b;font-size:14px;font-weight:720}.section-title .lucide{width:16px;height:16px;color:#16a34a;stroke-width:1.9}.section-meta{color:#94a3b8;font-size:9px;font-weight:600}
    .status-hero{padding:16px;border-radius:16px;background:linear-gradient(145deg,#17221b,#263a2e);color:#fff}.status-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.status-badge{padding:5px 8px;border-radius:7px;background:#16a34a;color:#fff;font-size:9px;font-weight:700;box-shadow:0 2px 0 #0f7433}.status-date{color:#9fb0a5;font-size:9px}.status-name{margin:0 0 15px;font-size:16px;line-height:1.45;font-weight:700;letter-spacing:-.025em;word-break:keep-all}.status-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:rgba(255,255,255,.12);border-radius:12px;overflow:hidden}.status-cell{padding:10px;background:rgba(255,255,255,.055)}.status-cell small{display:block;margin-bottom:3px;color:#9fb0a5;font-size:8px}.status-cell strong{color:#fff;font-size:11px;font-weight:600}
    .readiness-top{display:flex;align-items:end;justify-content:space-between;margin-bottom:8px}.readiness-top strong{font-size:20px;color:#15803d;font-weight:720}.readiness-top span{color:#64748b;font-size:9px}.readiness-bar{height:7px;margin-bottom:13px;border-radius:999px;background:#e8eeea;overflow:hidden}.readiness-bar span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#16a34a,#4ade80)}
    .check-list{display:grid;gap:7px}.check-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 10px;border:1px solid #edf1ef;border-radius:11px;background:#fafcfb}.check-label{display:flex;align-items:center;gap:7px;color:#475569;font-size:10px;font-weight:550}.check-label .lucide{width:13px;height:13px}.check-row.done .check-label .lucide{color:#16a34a}.check-row.missing .check-label .lucide{color:#f59e0b}.check-state{font-size:9px;font-weight:650}.done .check-state{color:#15803d}.missing .check-state{color:#b45309}
    .risk-list{display:grid;gap:8px}.risk-card{padding:12px;border:1px solid #fde7bd;border-radius:14px;background:#fffbeb}.risk-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;color:#92400e;font-size:11px;font-weight:700}.risk-top .lucide{width:14px;height:14px}.risk-card p{margin:0;color:#785b30;font-size:10px;line-height:1.55}.risk-empty{display:flex;align-items:center;gap:8px;padding:12px;border-radius:13px;background:#f0fdf4;color:#24733f;font-size:10px;line-height:1.5}.risk-empty .lucide{width:16px;height:16px;flex:0 0 16px}
    .quote-summary{padding:14px;border-radius:15px;background:#f4f7f5;border:1px solid #e0e7e2}.quote-summary.has{background:#17221b;border-color:#17221b;color:#fff}.quote-label{display:flex;align-items:center;gap:6px;margin-bottom:6px;color:#64748b;font-size:9px}.has .quote-label{color:#a7b7ad}.quote-label .lucide{width:13px;height:13px}.quote-value{font-size:16px;font-weight:720;color:#33473a}.has .quote-value{font-size:20px;color:#fff}.quote-hint{margin-top:5px;color:#849188;font-size:9px;line-height:1.45}.has .quote-hint{color:#9fb0a5}.quote-actions{display:grid;grid-template-columns:1fr 1.3fr;gap:8px;margin-top:10px}.quote-actions button{height:39px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:10px;font-weight:700}.quote-actions .lucide{width:13px;height:13px}.btn-outline{border:1px solid #d8e2dc;background:#fff;color:#526158}.btn-green{border:0;background:#16a34a;color:#fff;box-shadow:0 3px 0 #0f7433}
    .condition-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.condition{padding:11px;border:1px solid #e6ece8;border-radius:13px;background:#fbfcfb}.condition small{display:flex;align-items:center;gap:5px;margin-bottom:5px;color:#94a3b8;font-size:8px;font-weight:600}.condition small .lucide{width:11px;height:11px}.condition strong{color:#3b4b41;font-size:11px;line-height:1.4;font-weight:620}
    .next-card{padding:14px;border-radius:15px;background:#eef8f1}.next-label{display:flex;align-items:center;gap:6px;margin-bottom:7px;color:#15803d;font-size:9px;font-weight:700}.next-label .lucide{width:13px;height:13px}.next-title{margin:0 0 5px;color:#1f5130;font-size:13px;font-weight:700}.next-desc{margin:0 0 11px;color:#52705d;font-size:10px;line-height:1.55}.next-button{width:100%;height:39px;border:0;border-radius:9px;background:#16a34a;color:#fff;font-size:10px;font-weight:700;box-shadow:0 3px 0 #0f7433;display:flex;align-items:center;justify-content:center;gap:6px}.next-button .lucide{width:13px;height:13px}
    .br-empty{padding:30px 18px;border:1px dashed #cbd8cf;border-radius:18px;background:#fbfdfb;text-align:center;color:#728078;font-size:12px;line-height:1.6}.br-empty .lucide{display:block;width:27px;height:27px;margin:0 auto 10px;color:#94a3b8}.br-empty button{margin-top:13px;padding:10px 14px;border:0;border-radius:9px;background:#16a34a;color:#fff;font-size:10px;font-weight:700;box-shadow:0 3px 0 #0f7433}
    .tabs .lucide{width:20px;height:20px;stroke-width:1.8}
  </style>
</head>
<body data-page="briefing">
  <div class="app">
    <header>
      <div class="bar">
        <div class="logo"><a href="home.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
      </div>
    </header>
    <main>
      <div class="br-head"><h1>데이터 브리핑</h1><p>내 프로젝트의 준비 상태와 다음 행동을 확인하세요.</p></div>
      <div class="project-picker" id="pickerWrap"><select id="projectPicker" aria-label="프로젝트 선택"><option>프로젝트를 불러오는 중입니다.</option></select><i data-lucide="chevron-down"></i></div>
      <div id="briefingContent"><div class="br-empty">프로젝트 데이터를 불러오는 중입니다.</div></div>
    </main>
    <nav class="tabs"><ul>
      <li><button id="tab-home" onclick="window.location.assign('home.html')"><i data-lucide="house"></i><small>홈</small></button></li><li><button id="tab-records" onclick="window.location.assign('records.html')"><i data-lucide="list-checks"></i><small>기록</small></button></li><li><button id="tab-reco" onclick="window.location.assign('deals.html')"><i data-lucide="file-signature"></i><small>견적</small></button></li><li><button id="tab-my" onclick="window.location.assign('settings.html')"><i data-lucide="user"></i><small>마이</small></button></li>
    </ul></nav>
  </div>
  <div id="overlay" class="overlay" onclick="closeModal && closeModal(event)"></div><div id="modal" class="modal" style="display:none"></div><div id="toast" class="toast">처리되었습니다</div>
  <script src="app.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded',async function(){
    const picker=document.getElementById('projectPicker'),content=document.getElementById('briefingContent');let projects=[],surveys=[];
    const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const icons=()=>window.lucide&&window.lucide.createIcons({attrs:{'aria-hidden':'true'}});
    const stage=s=>({draft:'설계 중',quote_requested:'견적 요청',quote_review:'견적 검토',quote_received:'견적 검토',contracted:'계약 진행',construction:'시공 중',operating:'운영 중',done:'완료',complete:'완료'}[s]||'진행 중');
    const facility=v=>({biz_center:'지식산업센터',panel_factory:'판넬형 창고·공장',retail_space:'상가·근린시설'}[v]||'실내 공간');
    const money=p=>{const v=p.quote_total??p.quote_amount;if(v===null||v===undefined||v==='')return null;const n=Number(v);return Number.isFinite(n)?n.toLocaleString('ko-KR')+'원':String(v)};
    try{
      const {data:{session}}=await supabaseClient.auth.getSession();
      if(session){const pr=await supabaseClient.from('projects').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false});if(pr.error)throw pr.error;projects=pr.data||[];if(projects.length){const sr=await supabaseClient.from('project_surveys').select('*').in('project_id',projects.map(p=>p.id));if(!sr.error)surveys=sr.data||[]}}
    }catch(error){console.error('브리핑 데이터 조회 오류',error)}
    if(!projects.length){document.getElementById('pickerWrap').style.display='none';content.innerHTML='<div class="br-empty"><i data-lucide="folder-plus"></i>저장된 프로젝트가 없습니다.<br>설문을 완료하고 설계안을 저장하면 개인 브리핑을 볼 수 있어요.<button onclick="window.location.assign(\'survey_new.html\')">새 프로젝트 만들기</button></div>';icons();return}
    picker.innerHTML=projects.map(p=>'<option value="'+esc(p.id)+'">'+esc(p.name||'이름 없는 프로젝트')+'</option>').join('');const saved=localStorage.getItem('ep-current-project-id');if(saved&&projects.some(p=>String(p.id)===saved))picker.value=saved;
    function surveyFor(id){return surveys.find(s=>String(s.project_id)===String(id))||{}}
    function checks(s){return[
      {label:'공간 면적',ok:!!(s.usable_area||s.floor_area),value:s.usable_area||s.floor_area},
      {label:'층고',ok:!!s.ceil_height,value:s.ceil_height},
      {label:'전력 용량',ok:!!s.electric_power||s.electric_power_known==='yes',value:s.electric_power},
      {label:'급수 위치',ok:!!s.water_location||s.water_location_known==='yes',value:s.water_location},
      {label:'환기 방식',ok:!!s.ventilation,value:s.ventilation}
    ]}
    function render(){const p=projects.find(x=>String(x.id)===picker.value)||projects[0],s=surveyFor(p.id),items=checks(s),done=items.filter(x=>x.ok).length,percent=Math.round(done/items.length*100),risks=[];if(!items[2].ok)risks.push({title:'전력 용량 확인 필요',desc:'LED·냉난방·제습 설비 용량을 정하기 전에 계약전력과 분전반 위치를 확인해 주세요.'});if(!items[3].ok)risks.push({title:'급수·배수 위치 확인 필요',desc:'양액실과 재배랙 배치를 확정하려면 급수점과 배수 경로 확인이 필요합니다.'});if(!items[4].ok)risks.push({title:'환기 방식 확인 필요',desc:'공조와 제습 용량에 영향을 줄 수 있어 자연환기·기계환기 조건을 확인해 주세요.'});const amount=money(p),next=risks[0]||{title:'견적 단계 확인',desc:'입력 조건이 준비되었습니다. 견적·계약 페이지에서 다음 진행 상태를 확인해 주세요.'};
      content.innerHTML='<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="layout-dashboard"></i>프로젝트 현황</h2><span class="section-meta">최근 업데이트 '+esc((p.updated_at||p.created_at||'').slice(0,10)||'-')+'</span></div><div class="status-hero"><div class="status-top"><span class="status-badge">'+stage(p.status)+'</span><span class="status-date">내 프로젝트 브리핑</span></div><h3 class="status-name">'+esc(p.name||'이름 없는 프로젝트')+'</h3><div class="status-grid"><div class="status-cell"><small>공간 유형</small><strong>'+facility(s.facility)+'</strong></div><div class="status-cell"><small>사용 면적</small><strong>'+(s.usable_area||s.floor_area?esc(s.usable_area||s.floor_area)+'㎡':'확인 필요')+'</strong></div><div class="status-cell"><small>운영 인력</small><strong>'+(s.family_staff?esc(s.family_staff)+'명':'확인 필요')+'</strong></div><div class="status-cell"><small>목표 수익</small><strong>'+esc(s.profit_goal||'확인 필요')+'</strong></div></div></div></section>'+
      '<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="clipboard-check"></i>시설 준비도</h2><span class="section-meta">'+done+'/'+items.length+' 확인</span></div><div class="readiness-top"><strong>'+percent+'%</strong><span>'+(items.length-done)+'개 항목 확인 필요</span></div><div class="readiness-bar"><span style="width:'+percent+'%"></span></div><div class="check-list">'+items.map(x=>'<div class="check-row '+(x.ok?'done':'missing')+'"><span class="check-label"><i data-lucide="'+(x.ok?'circle-check':'circle-alert')+'"></i>'+x.label+'</span><span class="check-state">'+(x.ok?'확인 완료':'확인 필요')+'</span></div>').join('')+'</div></section>'+
      '<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="triangle-alert"></i>확인할 조건</h2><span class="section-meta">'+risks.length+'건</span></div><div class="risk-list">'+(risks.length?risks.map(r=>'<article class="risk-card"><div class="risk-top"><i data-lucide="circle-alert"></i>'+r.title+'</div><p>'+r.desc+'</p></article>').join(''):'<div class="risk-empty"><i data-lucide="badge-check"></i>기본 시설 조건이 모두 입력되어 있습니다. 현장 확인 단계에서 실제 조건을 다시 검토해 주세요.</div>')+'</div></section>'+
      '<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="receipt-text"></i>비용 브리핑</h2></div><div class="quote-summary '+(amount?'has':'')+'"><div class="quote-label"><i data-lucide="calculator"></i>'+(amount?'현재 등록 견적':'견적 현황')+'</div><div class="quote-value">'+(amount?esc(amount):'아직 등록된 견적이 없습니다.')+'</div><div class="quote-hint">'+(amount?'부가세와 별도 공사 포함 여부를 견적 페이지에서 확인하세요.':'설비 구성이 확정되면 비용 분석을 확인할 수 있어요.')+'</div></div><div class="quote-actions"><button class="btn-outline" data-go="recipe"><i data-lucide="layers-3"></i>설비 비교</button><button class="btn-green" data-go="deal"><i data-lucide="file-signature"></i>견적·계약 보기</button></div></section>'+
      '<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="scan-search"></i>입력 조건 요약</h2></div><div class="condition-grid"><div class="condition"><small><i data-lucide="ruler"></i>층고</small><strong>'+(s.ceil_height?esc(s.ceil_height)+'m':'확인 필요')+'</strong></div><div class="condition"><small><i data-lucide="zap"></i>전력</small><strong>'+(s.electric_power?esc(s.electric_power)+'kW':'확인 필요')+'</strong></div><div class="condition"><small><i data-lucide="droplets"></i>급수</small><strong>'+esc(s.water_supply||s.water_location||'확인 필요')+'</strong></div><div class="condition"><small><i data-lucide="wind"></i>환기</small><strong>'+esc(s.ventilation||'확인 필요')+'</strong></div></div></section>'+
      '<section class="br-section"><div class="section-head"><h2 class="section-title"><i data-lucide="route"></i>다음 행동</h2></div><div class="next-card"><div class="next-label"><i data-lucide="sparkles"></i>이 프로젝트에서 먼저 할 일</div><h3 class="next-title">'+next.title+'</h3><p class="next-desc">'+next.desc+'</p><button class="next-button" data-go="project"><i data-lucide="arrow-right"></i>프로젝트에서 확인하기</button></div></section>';icons();
      content.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{localStorage.setItem('ep-current-project-id',p.id);if(b.dataset.go==='recipe')location.assign('recipes.html');else if(b.dataset.go==='deal')location.assign('deals.html?project='+encodeURIComponent(p.id));else location.assign('project-detail.html')})
    }
    picker.onchange=()=>{localStorage.setItem('ep-current-project-id',picker.value);render()};render();icons();
  });
  </script>
</body>
</html>
