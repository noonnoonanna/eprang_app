<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="survey.css" />
	<title>이피랑</title>
</head>  
<body data-page="survey">
	<div class="app">
		<header>
			<div class="bar">
				<div class="logo"><a href="intro.html" style="all:unset;cursor:pointer"><img src="img/logo.png" alt="이피랑 로고"></a></div>
			</div>
		</header>
		
	<div class="progress-container">
		<div class="progress-info">
			<span><strong id="stepNow">1</strong> / 3</span>
			<span id="progressPercent">33%</span>
		</div>
		<div class="progress-track">
			<div class="progress-fill" id="progressBar"></div>
		</div>
	</div>

	<main id="wizardMain">    
		<form id="surveyForm" onsubmit="return false;">
		<!-- STEP 1: Basic Info -->
		<section class="survey-card active" data-step="0">
			<span class="q-badge">Step 1</span>
			<div class="q-title">어떤 농부를 꿈꾸시나요?</div>
			<div class="q-sub">가장 가까운 유형을 선택해 주세요.</div>

			<div class="field-group">
				<label class="field-label">유형</label>
				<div class="pill-grid">
					<label class="pill-label">
						<input type="radio" name="user_type" value="young" checked>
						<div class="pill-content"><i class="fa-solid fa-user-graduate"></i>
							<span>청년농</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="user_type" value="successor">
						<div class="pill-content"><i class="fa-solid fa-users"></i>
							<span>후계농</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="user_type" value="return">
						<div class="pill-content">
							<i class="fa-solid fa-tractor"></i>
							<span>귀농 예정</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="user_type" value="other">
						<div class="pill-content">
							<i class="fa-regular fa-face-smile"></i>
							<span>일반 창업자</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>

			<div class="field-group">
				<label class="field-label">지역</label>
				<input type="text" name="region_si" placeholder="예: 경기도 김포시, 충남 홍성군" autocomplete="off">
			</div>
	  
			<div class="field-group">
				<label class="field-label">정책자금 대상 여부</label>
				<div class="pill-grid">
					<label class="pill-label">
						<input type="radio" name="policy" value="yes">
						<div class="pill-content">
							<i class="fa-solid fa-file-contract"></i>
							<span>대상/신청 예정자</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="policy" value="no">
						<div class="pill-content">
							<i class="fa-solid fa-ban"></i>
							<span>해당 없음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="policy" value="unknown">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>잘 모름</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>

			<div class="field-group">
				<label class="field-label">희망 대출 규모 (대략)</label>
				<select name="loan_range">
					<option value="">선택해주세요</option>
					<option value="none">대출 계획 없음</option>
					<option value="lt100">1억 미만</option>
					<option value="100_300">1억 ~ 3억</option>
					<option value="gt300">3억 이상</option>
				</select>
			</div>

			<div class="field-group">
				<label class="field-label">보유 자기자본 범위 (선택)</label>
				<select name="own_capital">
					<option value="">선택 안 함</option>
					<option value="lt30">3천만 원 미만</option>
					<option value="30_100">3천만 ~ 1억</option>
					<option value="100_300">1억 ~ 3억</option>
					<option value="gt300">3억 이상</option>
				</select>
			</div>
		</section>

		<!-- STEP 2: Environment -->
		<section class="survey-card" data-step="1">
			<span class="q-badge">Step 2</span>
			<div class="q-title">어떤 환경을 선호하시나요?</div>
			<div class="q-sub">시설 유형과 규모를 알려주시면 맞춤 설계를 제안해 드립니다.</div>
	
			<div class="field-group">
				<label class="field-label" style="margin-bottom:21px;">시설 유형</label>
				<div class="pill-grid">
					<label class="pill-label">
						<input type="radio" name="facility" value="biz_center" checked>
						<div class="pill-content">
							<i class="fa-solid fa-city"></i>
							<span>지식산업센터</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="facility" value="retail_space">
						<div class="pill-content">
							<i class="fa-regular fa-building"></i>
							<span>상가/근린생활시설</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="facility" value="panel_factory">
						<div class="pill-content">
							<i class="fa-solid fa-industry"></i>
							<span>판넬형 창고·공장</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label> 
					<label class="pill-label">
						<input type="radio" name="facility" value="etc">
						<div class="pill-content">
							<i class="fa-solid fa-ellipsis"></i>
							<span>기타(복화문화공간, 지하 등)</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>
	
			<!-- 공간 스펙 -->
			<div class="field-group">
				<label class="field-label">전용 면적 (㎡)</label>
				<input type="number" name="floor_area" placeholder="숫자만 입력 (예: 100)" inputmode="numeric">
			</div>
			
			<div class="field-group">
				<label class="field-label">실제 사용 가능 면적 (㎡)</label>
				<input type="number" name="usable_area" placeholder="숫자만 입력 (예: 80)" inputmode="numeric">
			</div>
			
			<div class="field-group">
				<label class="field-label">층고 (m)</label>
				<input type="number" name="ceil_height" placeholder="예: 3.5" inputmode="numeric">
			</div>
			
			<div class="field-group">
				<label class="field-label">기둥 간격 / 위치</label>
				<input type="text" name="pillar_info" placeholder="예: 간격 6m, 중앙 1개" />
			</div>
			
			<div class="field-group">
				<label class="field-label">출입 동선</label>
				<input type="text" name="entrance_path" placeholder="예: 도어 폭 1.2m, 후문 있음" />
			</div>
	
			<hr style="margin:24px 0;">
	
			<!-- 인프라 -->
			<div class="field-group">
				<label class="field-label">계약 전력 (kW)</label>
				<input type="number" name="electric_power" placeholder="예: 20 (모르면 비워두세요)" inputmode="numeric">
			
				<div class="pill-grid" style="margin-top:8px;">
					<label class="pill-label">
						<input type="radio" name="electric_power_known" value="unknown" onclick="toggleRadio(this)">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>모르겠음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>


			<div class="field-group">
				<label class="field-label">전기 설비</label>
				<div class="pill-grid" style="grid-template-columns: repeat(3, 1fr);">
					<label class="pill-label">
						<input type="radio" name="electric_phase" value="single">
						<div class="pill-content">
							<i class="fa-solid fa-plug"></i>
							<span>단상</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="electric_phase" value="three">
						<div class="pill-content">
							<i class="fa-solid fa-bolt"></i>
							<span>3상</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="electric_phase" value="unknown">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>모르겠음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>


			<div class="field-group">
				<label class="field-label">분전반 위치</label>
				<input type="text" name="panel_location" placeholder="예: 우측 벽면 (모르면 비워두세요)" />
				
				<div class="pill-grid" style="margin-top:8px;">
					<label class="pill-label">
						<input type="radio" name="panel_location_known" value="unknown" onclick="toggleRadio(this)">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>모르겠음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>


			<div class="field-group">
				<label class="field-label">급·배수 가능 여부</label>
				<div class="pill-grid" style="grid-template-columns: repeat(3, 1fr);">
					<label class="pill-label">
						<input type="radio" name="water_supply" value="yes">
						<div class="pill-content">
							<i class="fa-solid fa-droplet"></i>
							<span>가능</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="water_supply" value="no">
						<div class="pill-content">
							<i class="fa-regular fa-circle-xmark"></i>
							<span>불가</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="water_supply" value="unknown">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>모르겠음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>


			<div class="field-group">
				<label class="field-label">급·배수 위치</label>
				<input type="text" name="water_location" placeholder="예: 전면부 1m (모르면 비워두세요)" />
				
				<div class="pill-grid" style="margin-top:8px;">
					<label class="pill-label">
						<input type="radio" name="water_location_known" value="unknown" onclick="toggleRadio(this)">
						<div class="pill-content">
							<i class="fa-regular fa-circle-question"></i>
							<span>모르겠음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>


			<div class="field-group">
				<label class="field-label">환기·배기</label>
				<div class="pill-grid">
					<label class="pill-label">
						<input type="radio" name="ventilation" value="window">
						<div class="pill-content">
							<i class="fa-solid fa-wind"></i>
							<span>창 있음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="ventilation" value="duct">
						<div class="pill-content">
							<i class="fa-solid fa-fan"></i>
							<span>덕트 있음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
					<label class="pill-label">
						<input type="radio" name="ventilation" value="none">
						<div class="pill-content">
							<i class="fa-regular fa-circle-xmark"></i>
							<span>없음</span>
						</div>
						<div class="pill-check"><i class="fa-solid fa-check"></i></div>
					</label>
				</div>
			</div>

  
		<div class="field-group">
			<label class="field-label">주당 근무 가능 시간</label>
			<select name="work_hours">
				<option value="">선택해 주세요</option>
				<option value="lt10">주 10시간 미만</option>
				<option value="10_20">주 10~20시간</option>
				<option value="20_40">주 20~40시간</option>
				<option value="gt40">주 40시간 이상</option>
			</select>
		</div>
	
		<div class="field-group">
			<label class="field-label">상근 여부</label>
			<div class="pill-grid" style="grid-template-columns: repeat(2, 1fr);">
				<label class="pill-label">
					<input type="radio" name="work_type" value="fulltime">
						<div class="pill-content">
						<i class="fa-solid fa-briefcase"></i>
						<span>상근<br>(풀타임)</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
				<label class="pill-label">
					<input type="radio" name="work_type" value="parttime">
						<div class="pill-content">
						<i class="fa-solid fa-moon"></i>
						<span>부업 / 겸업</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			</div>
		</div>
    
		<div class="field-group">
			<label class="field-label">함께 일하는 인원</label>
			<input type="number" name="family_staff" placeholder="본인 제외 인원 수 (예: 2)" inputmode="numeric">
		</div>
    </section>

    <!-- STEP 3: Goals -->
    <section class="survey-card" data-step="2">
        <span class="q-badge">Step 3</span>
        <div class="q-title">목표와 선호도를 알려주세요.</div>
        <div class="q-sub">수익 목표와 리스크 성향에 따라 작목을 추천해 드립니다.</div>

        <div class="field-group">
			<label class="field-label">목표 월 수익</label>
			<select name="profit_goal">
				<option value="" disabled selected>선택해 주세요</option>
				<option value="100">월 100만원 미만 (소소하게)</option>
				<option value="300">월 100~300만원 (부업 수준)</option>
				<option value="500">월 300~500만원 (안정적)</option>
				<option value="high">월 500만원 이상 (고수익)</option>
			</select>
        </div>

        <div class="field-group">
			<label class="field-label">운영 성향</label>
			<div class="pill-grid" style="grid-template-columns: 1fr 1fr 1fr;">
				<label class="pill-label">
					<input type="radio" name="risk" value="low" checked>
					<div class="pill-content" style="padding: 12px;">
						<i class="fa-solid fa-shield-cat"></i>
						<span>안정형</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
				<label class="pill-label">
					<input type="radio" name="risk" value="mid">
					<div class="pill-content" style="padding: 12px;">
						<i class="fa-solid fa-balance-scale"></i>
						<span>중립형</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
				<label class="pill-label">
					<input type="radio" name="risk" value="high">
					<div class="pill-content" style="padding: 12px;">
						<i class="fa-solid fa-rocket"></i>
						<span>성장형</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			</div>
        </div>
		
		<!-- 유통 경로 선호 (복수 선택 + 기타 입력 가능) -->
		<div class="field-group">
			<label class="field-label">유통 경로 선호 <span style="font-size:0.85rem; color:#6b7280;">(복수 선택 가능)</span></label>
		
			<div class="pill-grid" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
				<label class="pill-label">
					<input type="checkbox" name="distribution" value="wholesale">
					<div class="pill-content">
						<i class="fa-solid fa-truck"></i>
						<span>도매</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			
				<label class="pill-label">
					<input type="checkbox" name="distribution" value="horeca_retail">
					<div class="pill-content">
						<i class="fa-solid fa-box-open"></i>
						<span>식당/카페/리테일 납품</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			
				<label class="pill-label">
					<input type="checkbox" name="distribution" value="experience_edu_landscape">
					<div class="pill-content">
						<i class="fa-solid fa-person-walking"></i>
						<span>체험·관광·교육·조경용 위주</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			
				<label class="pill-label">
					<input type="checkbox" name="distribution" value="mixed_use">
					<div class="pill-content">
						<i class="fa-solid fa-utensils"></i>
						<span>복합(생산+체험/조경)</span>
					</div>
					<div class="pill-check"><i class="fa-solid fa-check"></i></div>
				</label>
			</div>
		
			<!-- 기타(선택 없음, 입력만) -->
			<input type="text" name="distribution_etc" placeholder="그 외 유통 경로를 입력해주세요." style="margin-top:12px;">
		</div>

    </section>
	</form>
	</main>
	</div>

	<!-- Navigation Bar -->
	<div class="bottom-bar">
		<button type="button" class="btn btn-prev" id="btnPrev" disabled>이전</button>
		<button type="button" class="btn btn-next" id="btnNext">다음</button>
	</div>

	<!-- Modal -->
	<div class="modal-overlay" id="customModal">
		<div class="modal-content">
			<div style="font-size: 2rem; margin-bottom: 12px;">🌱</div>
			<div class="modal-title" id="modalTitle">알림</div>
			<div class="modal-msg" id="modalMsg">메시지 내용</div>
			<button class="modal-btn" id="btnCloseModal">확인</button>
		</div>
	</div>
	<script src="app.js" defer></script>
	<script defer>
	// 라디오 버튼을 다시 누르면 해제되게 만드는 전역 함수
	let lastCheckedRadio = null;
	
	function toggleRadio(radio) {
	// 만약 방금 누른 라디오가 이미 체크되어 있던 상태라면
	if (radio.dataset.wasChecked === 'true') {
		radio.checked = false;
		radio.dataset.wasChecked = 'false';
		// 만약 상위 sync 함수나 데이터 수집 함수가 있다면 여기서 호출 가능
		if (typeof syncAllAgree === 'function') syncAllAgree(); 
	} else {
		// 같은 group(name)을 가진 모든 라디오의 기억을 리셋
		const name = radio.name;
		document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
		r.dataset.wasChecked = 'false';
		});
		// 현재 누른 것만 참으로 기록
		radio.dataset.wasChecked = 'true';
	}
	}

     (function () {
      const steps = Array.from(document.querySelectorAll('.survey-card'));
      const total = steps.length;
      const bar = document.getElementById('progressBar');
      const stepNow = document.getElementById('stepNow');
      const progressPercent = document.getElementById('progressPercent');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      const form = document.getElementById('surveyForm');
      let current = 0;

      document.querySelectorAll('.list-item input').forEach(input => {
        input.addEventListener('change', function() {
          const parent = this.closest('.list-item');
          if(this.type === 'radio') {

             const name = this.name;
             document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
               r.closest('.list-item').classList.remove('selected');
             });
          }
          if(this.checked) parent.classList.add('selected');
          else parent.classList.remove('selected');
        });
      });

      function updateView() {
        const pct = Math.round(((current + 1) / total) * 100);
        bar.style.width = pct + '%';
        stepNow.textContent = current + 1;
        progressPercent.textContent = pct + '%';

        steps.forEach((s, idx) => {
          if (idx === current) {
            s.classList.remove('slide-out');
            s.classList.add('active');
          } else if (idx < current) {
             s.classList.remove('active');
             s.classList.add('slide-out');
             setTimeout(() => s.classList.remove('active'), 300);
          } else {
            s.classList.remove('active', 'slide-out');
          }
        });

        btnPrev.disabled = false;
        btnNext.innerHTML = (current === total - 1) ? '결과 보기 <i class="fa-solid fa-arrow-right"></i>' : '다음 단계';
        
		const main = document.getElementById('wizardMain');
        main.scrollTo({ top: 0, behavior: 'smooth' });
      }

function showModal(msg) {
  const m = document.getElementById('customModal');
  document.getElementById('modalTitle').style.display = 'none';
  document.getElementById('modalMsg').textContent = msg;
  m.style.display = 'flex';
}
      
function closeModal() {
  document.getElementById('customModal').style.display = 'none';
}

const btnCloseModal = document.getElementById('btnCloseModal');
if (btnCloseModal) {
  btnCloseModal.addEventListener('click', closeModal);
}

     function validateStep(idx) {
  const section = steps[idx];

  if (idx === 0) {
    const region = section.querySelector('input[name="region_si"]').value.trim();
    const policy = section.querySelector('input[name="policy"]:checked');
    const loan = section.querySelector('select[name="loan_range"]').value;

    if (!region) { showModal('지역을 입력해 주세요.'); return false; }
    if (!policy) { showModal('정책자금 대상 여부를 선택해 주세요.'); return false; }
    if (!loan) { showModal('희망 대출 규모를 선택해 주세요.'); return false; }
  }

  if (idx === 1) {
    const floorArea = section.querySelector('input[name="floor_area"]').value.trim();
    const usableArea = section.querySelector('input[name="usable_area"]').value.trim();
    const ceilHeight = section.querySelector('input[name="ceil_height"]').value.trim();
    const pillarInfo = section.querySelector('input[name="pillar_info"]').value.trim();
    const entrancePath = section.querySelector('input[name="entrance_path"]').value.trim();

    const electricPower = section.querySelector('input[name="electric_power"]').value.trim();
    const electricPowerKnown = section.querySelector('input[name="electric_power_known"]:checked');
    const electricPhase = section.querySelector('input[name="electric_phase"]:checked');

    const panelLocation = section.querySelector('input[name="panel_location"]').value.trim();
    const panelLocationKnown = section.querySelector('input[name="panel_location_known"]:checked');

    const waterSupply = section.querySelector('input[name="water_supply"]:checked');
    const waterLocation = section.querySelector('input[name="water_location"]').value.trim();
    const waterLocationKnown = section.querySelector('input[name="water_location_known"]:checked');

    const ventilation = section.querySelector('input[name="ventilation"]:checked');

    const workHours = section.querySelector('select[name="work_hours"]').value;
    const workType = section.querySelector('input[name="work_type"]:checked');
    const familyStaff = section.querySelector('input[name="family_staff"]').value.trim();

    if (!floorArea) { showModal('전용 면적을 입력해 주세요.'); return false; }
    if (!usableArea) { showModal('실제 사용 가능 면적을 입력해 주세요.'); return false; }
    if (!ceilHeight) { showModal('층고를 입력해 주세요.'); return false; }
    if (!pillarInfo) { showModal('기둥 간격 또는 위치를 입력해 주세요.'); return false; }
    if (!entrancePath) { showModal('출입 동선을 입력해 주세요.'); return false; }

    if (!electricPower && !electricPowerKnown) { showModal('계약 전력을 입력하거나 모르겠음을 선택해 주세요.'); return false; }
    if (!electricPhase) { showModal('전기 설비 항목을 선택해 주세요.'); return false; }

    if (!panelLocation && !panelLocationKnown) { showModal('분전반 위치를 입력하거나 모르겠음을 선택해 주세요.'); return false; }

    if (!waterSupply) { showModal('급·배수 가능 여부를 선택해 주세요.'); return false; }
    if (!waterLocation && !waterLocationKnown) { showModal('급·배수 위치를 입력하거나 모르겠음을 선택해 주세요.'); return false; }

    if (!ventilation) { showModal('환기 또는 배기 방식 선택이 필요합니다.'); return false; }

    if (!workHours) { showModal('주당 근무 가능 시간을 선택해 주세요.'); return false; }
    if (!workType) { showModal('상근 여부를 선택해 주세요.'); return false; }
    if (!familyStaff) { showModal('함께 일하는 인원 수를 입력해 주세요.'); return false; }
  }

  if (idx === 2) {
    const profit = section.querySelector('select[name="profit_goal"]').value;
    const distributionChecked = section.querySelector('input[name="distribution"]:checked');
    const distributionEtc = section.querySelector('input[name="distribution_etc"]').value.trim();

    if (!profit) { showModal('목표 월 수익을 선택해 주세요.'); return false; }
    if (!distributionChecked && !distributionEtc) { showModal('유통 경로를 선택하거나 기타 항목을 입력해 주세요.'); return false; }
  }

  return true;
}

function collectSmartFarmSurvey() {
  const getVal = (name) =>
    (form.querySelector(`[name="${name}"]`)?.value || '').trim();

  const getRadio = (name) => {
    const el = form.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : '';
  };

  const getMulti = (name) =>
    Array.from(form.querySelectorAll(`input[name="${name}"]:checked`))
      .map(i => i.value);

  return {
    createdAt: new Date().toISOString(),

    // STEP 1: 기본 정보
    step1: {
      user_type: getRadio('user_type'),
      region_si: getVal('region_si'),
      policy: getRadio('policy'),
      loan_range: getVal('loan_range'),
      own_capital: getVal('own_capital')
    },

    // STEP 2: 환경/공간/인프라
    step2: {
      facility: getRadio('facility'),

      // 공간 스펙
      floor_area: getVal('floor_area'),        // 전용 면적(㎡)
      usable_area: getVal('usable_area'),      // 실제 사용 가능 면적(㎡)
      ceil_height: getVal('ceil_height'),      // 층고(m)
      pillar_info: getVal('pillar_info'),      // 기둥 간격/위치
      entrance_path: getVal('entrance_path'),  // 출입 동선

      // 인프라 - 전기
      electric_power: getVal('electric_power'),           // 계약 전력(kW)
      electric_power_known: getRadio('electric_power_known'), // 모름 여부
      electric_phase: getRadio('electric_phase'),         // 단상/3상/모름

      // 인프라 - 분전반
      panel_location: getVal('panel_location'),
      panel_location_known: getRadio('panel_location_known'),

      // 인프라 - 급·배수
      water_supply: getRadio('water_supply'),             // 가능/불가/모름
      water_location: getVal('water_location'),
      water_location_known: getRadio('water_location_known'),

      // 인프라 - 환기/배기
      ventilation: getRadio('ventilation'),               // window/duct/none

      // 운영 조건
      work_hours: getVal('work_hours'),
      work_type: getRadio('work_type'),
      family_staff: getVal('family_staff')
    },

    // STEP 3: 목표/리스크/유통
    step3: {
      profit_goal: getVal('profit_goal'),
      risk: getRadio('risk'),
      distribution: getMulti('distribution'),
      distribution_etc: getVal('distribution_etc')
    }
  };
}

btnPrev.addEventListener('click', () => {
  if (current > 0) {
    // 1단계 이후부터는 그냥 이전 스텝으로 이동
    current--;
    updateView();
  } else {
    // current === 0 일 때는 terms.html로 이동
    window.location.assign('terms.html');
  }
});

btnNext.addEventListener('click', () => {
  // 1) 현재 단계 유효성 검사
  if (!validateStep(current)) return;

  // 2) 마지막 단계 전이면 다음 스텝으로 이동
  if (current < total - 1) {
    current++;
    updateView();
  } else {
    // 3) 마지막 단계면 설문 데이터 저장 후 추천 페이지로 이동
    const surveyData = collectSmartFarmSurvey();
    localStorage.setItem('eprang-survey-latest', JSON.stringify(surveyData));
    window.location.assign('reco-intro.html');
  }
});

      // Init
      updateView();
    })();
  </script>
